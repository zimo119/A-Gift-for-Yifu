<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Journey - For Yifu Wang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    color: #fff;
  }
  #game-container {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #game-canvas {
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%; max-height: 100%;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  /* ThinkPad icon - positioned relative to game canvas, not viewport */
  #thinkpad-icon {
    position: absolute;
    /* These will be updated by JS to align with game canvas top-right */
    top: 20px; right: 20px;
    width: 64px; height: 64px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
    image-rendering: pixelated;
  }
  #thinkpad-icon:hover { opacity: 1; transform: scale(1.08); }
  /* ThinkPad overlay (click to open) - with grow animation from icon */
  #thinkpad-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    flex-direction: column;
    transition: background 0.4s ease;
  }
  #thinkpad-overlay.active {
    display: flex;
    background: rgba(0,0,0,0.92);
  }
  .tp-screen {
    /* Start small (icon size) and grow to full size */
    width: 48px; height: 36px;
    background: #1a1a1a;
    border: 4px solid #2a2a2a;
    border-radius: 3px 3px 0 0;
    box-shadow: 0 0 0 rgba(80,140,200,0);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.5);
    /* Smooth grow animation */
    transition: width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1),
                height 0.6s cubic-bezier(0.34, 1.2, 0.64, 1),
                border-width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1),
                opacity 0.3s ease,
                transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1),
                box-shadow 0.6s ease;
  }
  #thinkpad-overlay.active .tp-screen {
    width: 480px; height: 360px;
    border-width: 14px;
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 60px rgba(80,140,200,0.3), inset 0 0 30px rgba(0,0,0,0.8);
  }
  .tp-screen img {
    width: 100%; height: 100%;
    object-fit: cover;
    image-rendering: pixelated;
    opacity: 0;
    transition: opacity 0.4s ease 0.4s;
  }
  #thinkpad-overlay.active .tp-screen img { opacity: 1; }
  /* "thinkpad" label inside screen (top-right blank area) */
  .tp-label {
    position: absolute;
    top: 6px; right: 10px;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s ease 0.5s;
    z-index: 2;
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
  }
  #thinkpad-overlay.active .tp-label { opacity: 0.7; }
  .tp-buttons {
    margin-top: 28px;
    display: flex; gap: 24px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s ease 0.6s, transform 0.3s ease 0.6s;
  }
  #thinkpad-overlay.active .tp-buttons { opacity: 1; transform: translateY(0); }
  .tp-btn {
    background: #2a3a4a;
    color: #cfe3ff;
    border: 2px solid #4a6a8a;
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    transform: translateY(0);
    position: relative;
  }
  .tp-btn:hover {
    background: #3a5a7a;
    border-color: #6a9aca;
    color: #fff;
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 4px 12px rgba(106,154,202,0.4), 0 0 20px rgba(106,154,202,0.2);
  }
  .tp-btn:active {
    transform: translateY(1px) scale(0.98);
    background: #1a2a3a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  /* Dialogue box */
  #dialogue-box {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    width: 80%; max-width: 720px;
    background: rgba(0,0,0,0.85);
    border: 2px solid #c9a86a;
    border-radius: 4px;
    padding: 16px 24px;
    color: #f0e6d0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.5;
    display: none;
    z-index: 20;
    box-shadow: 0 0 20px rgba(201,168,106,0.3);
  }
  #dialogue-box.active { display: block; }
  #dialogue-speaker {
    color: #c9a86a;
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #dialogue-text { min-height: 24px; }
  /* Subtitle (for memory text, chapter titles) */
  #subtitle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #f0e6d0;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    text-align: center;
    text-shadow: 0 0 12px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.8s;
    pointer-events: none;
    z-index: 15;
    max-width: 80%;
  }
  #subtitle.active { opacity: 1; }
  /* Prompt (e.g., "Press SPACE to interact") */
  #prompt {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: #f0d090;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1.5px;
    display: none;
    z-index: 15;
    text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 2px 4px rgba(0,0,0,0.8);
    animation: blink 1.4s infinite;
    padding: 8px 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    border: 1px solid rgba(201,168,106,0.4);
  }
  #prompt.active { display: block; }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.35; } }
  /* Loading screen */
  #loading {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: #c9a86a;
    font-family: 'Courier New', monospace;
    z-index: 200;
  }
  #loading.hidden { display: none; }
  .loading-bar {
    width: 280px; height: 4px;
    background: #2a2a2a;
    margin-top: 20px;
    overflow: hidden;
  }
  .loading-fill {
    width: 0%; height: 100%;
    background: linear-gradient(90deg, #c9a86a, #f0d090);
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas" width="960" height="540"></canvas>

  <canvas id="thinkpad-icon" width="32" height="32"></canvas>

  <div id="thinkpad-overlay">
    <div class="tp-screen">
      <img id="tp-photo" src="" alt="Family">
      <div class="tp-label">thinkpad</div>
    </div>
    <div class="tp-buttons">
      <button class="tp-btn" id="tp-continue">CONTINUE</button>
      <button class="tp-btn" id="tp-menu">MAIN MENU</button>
    </div>
  </div>

  <div id="dialogue-box">
    <div id="dialogue-speaker"></div>
    <div id="dialogue-text"></div>
  </div>

  <div id="subtitle"></div>
  <div id="prompt"></div>

  <div id="loading">
    <div style="font-size: 24px; letter-spacing: 4px;">THE JOURNEY</div>
    <div style="font-size: 12px; color: #888; margin-top: 8px; letter-spacing: 2px;">Loading...</div>
    <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
  </div>
</div>

<script>
/* ============================================================
   THE JOURNEY - A Father's Day Gift for Yifu Wang
   ============================================================ */

// ===== CONSTANTS =====
const CW = 960, CH = 540;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ===== UTILITIES =====
function drawSprite(ctx, sprite, palette, x, y, scale = 1, flip = false) {
  const rows = sprite.length;
  const cols = sprite[0].length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = sprite[r][c];
      const color = palette[ch];
      if (color) {
        ctx.fillStyle = color;
        const dx = flip ? x + (cols - 1 - c) * scale : x + c * scale;
        ctx.fillRect(dx, y + r * scale, scale, scale);
      }
    }
  }
}

function spriteSize(sprite) {
  return { w: sprite[0].length, h: sprite.length };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function fillCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawText(text, x, y, options = {}) {
  ctx.fillStyle = options.color || '#fff';
  ctx.font = options.font || '14px "Courier New", monospace';
  ctx.textAlign = options.align || 'left';
  ctx.textBaseline = options.baseline || 'top';
  if (options.shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
  }
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}

// Simple seeded noise for backgrounds
let seedRng = 12345;
function srand() {
  seedRng = (seedRng * 9301 + 49297) % 233280;
  return seedRng / 233280;
}
function sresetSeed(s) { seedRng = s; }

// Load all audio buffers
async function loadAudioBuffers() {
  if (!audioCtx) return;
  const promises = [];
  for (const [name, dataUri] of Object.entries(AUDIO_DATA)) {
    promises.push(
      fetch(dataUri)
        .then(r => r.arrayBuffer())
        .then(buf => audioCtx.decodeAudioData(buf))
        .then(decoded => {
          game.audioBuffers[name] = decoded;
          console.log(`Audio loaded: ${name} (${decoded.duration.toFixed(2)}s)`);
        })
        .catch(err => console.warn(`Failed to load audio ${name}:`, err))
    );
  }
  await Promise.all(promises);
  game.audioReady = true;
}

// Play an audio buffer with options
function playAudioBuffer(name, options = {}) {
  if (!audioCtx || !game.audioBuffers[name]) return null;
  const buf = game.audioBuffers[name];
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = options.loop || false;

  const g = audioCtx.createGain();
  g.gain.value = options.volume !== undefined ? options.volume : 0.5;

  src.connect(g);
  g.connect(audioCtx.destination);

  src.start();
  return { src, g };
}

// Stop a playing audio source
function stopAudioSource(handle) {
  if (!handle) return;
  try { handle.src.stop(); } catch (e) {}
}

// Wood footsteps for Chapter 1 - programmatic "thump thump thump"
let woodFootstepTimer = null;
function startWoodFootsteps(intervalMs = 380, volume = 0.18) {
  stopWoodFootsteps();
  const tick = () => {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    // Wood thump - low frequency sine with quick decay + a bit of noise
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(rand(120, 160), now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
    g.gain.setValueAtTime(volume, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.12);

    // Add a tiny click (high freq noise burst) for the shoe hit
    const noise = audioCtx.createBufferSource();
    const nbuf = audioCtx.createBuffer(1, 800, audioCtx.sampleRate);
    const nd = nbuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / nd.length);
    noise.buffer = nbuf;
    const nf = audioCtx.createBiquadFilter();
    nf.type = 'highpass';
    nf.frequency.value = 1500;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(volume * 0.5, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    noise.connect(nf); nf.connect(ng); ng.connect(audioCtx.destination);
    noise.start(now); noise.stop(now + 0.05);
  };
  tick();
  woodFootstepTimer = setInterval(tick, intervalMs);
}
function stopWoodFootsteps() {
  if (woodFootstepTimer) { clearInterval(woodFootstepTimer); woodFootstepTimer = null; }
}

// Save / load
function saveGame() {
  try {
    localStorage.setItem('theJourney_save', JSON.stringify({
      unlockedChapters: game.unlockedChapters,
      gameComplete: game.gameComplete,
    }));
  } catch (e) { console.warn('Save failed', e); }
}
function loadGame() {
  try {
    const s = localStorage.getItem('theJourney_save');
    if (s) {
      const d = JSON.parse(s);
      game.unlockedChapters = d.unlockedChapters || 1;
      game.gameComplete = d.gameComplete || false;
    }
  } catch (e) { console.warn('Load failed', e); }
}

// ===== ANIMATED CHARACTER DRAWING (top-down with realistic walking animation) =====
// Characters are drawn as a 16x16 sprite with bobbing + legs that swing forward/back (cross-walk).
// Shadow under each character.

function drawCharacter(ctx, sprite, palette, x, y, scale, walkPhase, facing = 'down') {
  const sz = spriteSize(sprite);
  const isWalking = walkPhase !== 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + sz.w * scale / 2, y + sz.h * scale - 2, sz.w * scale * 0.4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // When walking, hide the sprite's legs (rows 12-15) so we can draw animated legs on top
  // We'll draw the sprite but clip to rows 0-11 (head + torso)
  if (isWalking) {
    // Clip to upper body (rows 0-11)
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, sz.w * scale, 12 * scale);
    ctx.clip();
    // Vertical bobbing
    const bob = Math.abs(Math.sin(walkPhase * 2)) * scale * 0.4;
    drawSprite(ctx, sprite, palette, x, y + bob, scale);
    ctx.restore();

    // Draw animated legs BELOW the body
    // Leg origin: around y = 12 * scale (where torso ends)
    // Two legs side by side at x offsets
    const legOriginY = y + 12 * scale;
    const leftLegX = x + 4 * scale;
    const rightLegX = x + 10 * scale;
    const legW = 2 * scale;
    const legH = 3 * scale;

    // Leg swing: sin(walkPhase) controls forward/back position
    // Left leg goes forward when sin > 0, back when sin < 0
    // Right leg is opposite (180 degrees out of phase)
    const phase = walkPhase;
    const leftSwing = Math.sin(phase);   // -1 to 1
    const rightSwing = Math.sin(phase + Math.PI);

    const legColor = palette['p'] || '#2a2a3a';
    const shoeColor = palette['s'] || '#1a1a1a';

    // Draw left leg (swung forward/back)
    // Forward = leg extends down-forward (longer), Back = leg lifts up (shorter, angled back)
    drawWalkingLeg(leftLegX, legOriginY, legW, legH, leftSwing, legColor, shoeColor, bob);
    // Draw right leg
    drawWalkingLeg(rightLegX, legOriginY, legW, legH, rightSwing, legColor, shoeColor, bob);
  } else {
    // Standing - draw sprite normally
    drawSprite(ctx, sprite, palette, x, y, scale);
  }
}

// Helper: draw a single walking leg with swing animation
// swing: -1 (back, lifted) to 1 (forward, extended)
function drawWalkingLeg(originX, originY, legW, legH, swing, legColor, shoeColor, bob) {
  // Leg is drawn as two segments (thigh + shin) for natural walking
  // Thigh: from hip downward, angled by swing
  // Shin: continues from knee, angled slightly back for natural stride

  const hipX = originX + legW / 2;
  const hipY = originY + bob;

  // Thigh angle: swing forward (+) or back (-)
  // Map swing [-1, 1] to angle [-0.4, 0.4] radians
  const thighAngle = swing * 0.4;
  const thighLen = legH * 0.55;

  const kneeX = hipX + Math.sin(thighAngle) * thighLen;
  const kneeY = hipY + Math.cos(thighAngle) * thighLen;

  // Shin angle: when leg is forward, shin extends down; when back, shin lifts
  // For natural walk, shin angle is opposite to thigh
  const shinAngle = -swing * 0.3;
  const shinLen = legH * 0.55;

  const footX = kneeX + Math.sin(shinAngle) * shinLen;
  const footY = kneeY + Math.cos(shinAngle) * shinLen;

  // Draw thigh (thick line via rotated rect)
  ctx.strokeStyle = legColor;
  ctx.lineWidth = legW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(hipX, hipY);
  ctx.lineTo(kneeX, kneeY);
  ctx.stroke();

  // Draw shin
  ctx.beginPath();
  ctx.moveTo(kneeX, kneeY);
  ctx.lineTo(footX, footY);
  ctx.stroke();

  // Draw shoe (small rectangle at foot)
  ctx.fillStyle = shoeColor;
  ctx.fillRect(footX - legW / 2, footY - 1, legW + 1, 2);
}

// ===== DRAW DOG (Tracy) - side view with 4-leg cross-walk animation + sit animation =====
// isSitting: when true, dog sits on hind legs
function drawDog(ctx, sprite, palette, x, y, scale, walkPhase, isSitting = false) {
  const sz = spriteSize(sprite);
  const isWalking = walkPhase !== 0 && !isSitting;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(x + sz.w * scale / 2, y + sz.h * scale - 2, sz.w * scale * 0.4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  if (isSitting) {
    // Sitting pose: dog body tilted back, front legs straight down, back legs folded under
    // We draw the sprite but tilt the back part up
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    // Draw the sprite normally but add sitting indicators
    ctx.restore();

    // Custom sitting drawing
    const px = x, py = y;
    // Body (sitting - more upright)
    ctx.fillStyle = palette['b'];
    // Hindquarters (bottom, wider)
    ctx.fillRect(px + 4 * scale, py + 8 * scale, 10 * scale, 5 * scale);
    // Body (upright torso)
    ctx.fillRect(px + 5 * scale, py + 4 * scale, 8 * scale, 5 * scale);
    // Head
    ctx.fillRect(px + 4 * scale, py + 1 * scale, 6 * scale, 4 * scale);
    // Ear (floppy)
    ctx.fillRect(px + 4 * scale, py + 2 * scale, 2 * scale, 3 * scale);
    // Light muzzle
    ctx.fillStyle = palette['l'];
    ctx.fillRect(px + 8 * scale, py + 2 * scale, 3 * scale, 2 * scale);
    // Red collar
    ctx.fillStyle = palette['r'];
    ctx.fillRect(px + 5 * scale, py + 5 * scale, 8 * scale, 1 * scale);
    // Front legs (straight down from chest)
    ctx.fillStyle = palette['b'];
    ctx.fillRect(px + 6 * scale, py + 9 * scale, 2 * scale, 3 * scale);
    ctx.fillRect(px + 9 * scale, py + 9 * scale, 2 * scale, 3 * scale);
    // Front paws (light)
    ctx.fillStyle = palette['s'];
    ctx.fillRect(px + 6 * scale, py + 11 * scale, 2 * scale, 1 * scale);
    ctx.fillRect(px + 9 * scale, py + 11 * scale, 2 * scale, 1 * scale);
    // Tail (curled up)
    ctx.fillStyle = palette['t'];
    ctx.fillRect(px + 13 * scale, py + 6 * scale, 2 * scale, 2 * scale);
    ctx.fillRect(px + 14 * scale, py + 4 * scale, 1 * scale, 2 * scale);
    return;
  }

  // Walking/standing pose
  // Slight bobbing
  const bob = isWalking ? Math.abs(Math.sin(walkPhase * 2)) * scale * 0.3 : 0;
  drawSprite(ctx, sprite, palette, x, y + bob, scale);

  // 4-leg cross-walk animation - diagonal pairs move together
  if (isWalking) {
    // Hide the sprite's legs (rows 9-11) by drawing body color over them, then redraw animated legs
    const phase = walkPhase;
    // Back-left + front-right move together (phase A)
    // Back-right + front-left move together (phase B)
    const phaseA = Math.sin(phase);
    const phaseB = Math.sin(phase + Math.PI);

    const legColor = palette['b'];
    const pawColor = palette['s'];

    // Back legs (col 3-4) - phase B
    drawDogLeg(x + 3.5 * scale, y + 9 * scale + bob, scale, phaseB, legColor, pawColor, false);
    // Front legs (col 13-14) - phase A
    drawDogLeg(x + 13.5 * scale, y + 9 * scale + bob, scale, phaseA, legColor, pawColor, true);
  }
}

// Helper: draw a single dog leg with swing
function drawDogLeg(originX, originY, scale, swing, legColor, pawColor, isFront) {
  const legW = 1.5 * scale;
  const legH = 2.5 * scale;

  // For front legs, swing forward; for back legs, swing back (opposite direction)
  const dir = isFront ? 1 : -1;
  const angle = swing * 0.35 * dir;
  const thighLen = legH * 0.5;
  const shinLen = legH * 0.5;

  const hipX = originX;
  const hipY = originY;
  const kneeX = hipX + Math.sin(angle) * thighLen;
  const kneeY = hipY + Math.cos(angle) * thighLen;
  const shinAngle = -swing * 0.25 * dir;
  const footX = kneeX + Math.sin(shinAngle) * shinLen;
  const footY = kneeY + Math.cos(shinAngle) * shinLen;

  ctx.strokeStyle = legColor;
  ctx.lineWidth = legW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(hipX, hipY);
  ctx.lineTo(kneeX, kneeY);
  ctx.lineTo(footX, footY);
  ctx.stroke();

  // Paw
  ctx.fillStyle = pawColor;
  ctx.fillRect(footX - legW / 2, footY - 1, legW + 1, 2);
}

function drawSheetCharacter(ctx, spriteSheet, palette, x, y, scale, walkPhase, isWalking) {
  let frameIdx;
  if (isWalking) {
    frameIdx = Math.floor(walkPhase / (Math.PI / 2)) % 4;
  } else {
    frameIdx = 0;
  }
  const frame = spriteSheet[frameIdx];
  const frameH = frame.length;
  const frameW = frame[0].length;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + frameW * scale / 2, y + frameH * scale - 1, frameW * scale * 0.4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Draw the frame
  drawSprite(ctx, frame, palette, x, y, scale);
}

  const scaleX = CW / rect.width;

  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

// ===== DIALOGUE SYSTEM =====
const dialogueBox = document.getElementById('dialogue-box');
const dialogueSpeaker = document.getElementById('dialogue-speaker');
const dialogueText = document.getElementById('dialogue-text');

let dialogueQueue = [];
let dialogueActive = false;
let dialogueCharIdx = 0;
let dialogueFullText = '';
let dialogueLastChar = 0;
let dialogueOnComplete = null;
const DIALOGUE_CHAR_SPEED = 35;  // ms per char

function showDialogue(speaker, text, onComplete) {
  if (Array.isArray(text)) {
    dialogueQueue.push(...text.map(t => ({ speaker, text: t })));
  } else {
    dialogueQueue.push({ speaker, text });
  }
  if (!dialogueActive) {
    advanceDialogue();
  }
  dialogueOnComplete = onComplete || null;
}

function advanceDialogue() {
  if (dialogueQueue.length === 0) {
    dialogueActive = false;
    dialogueBox.classList.remove('active');
    const cb = dialogueOnComplete;
    dialogueOnComplete = null;
    if (cb) cb();
    return;
  }
  const item = dialogueQueue.shift();
  dialogueActive = true;
  dialogueBox.classList.add('active');
  dialogueSpeaker.textContent = item.speaker || '';
  dialogueFullText = item.text;
  dialogueCharIdx = 0;
  dialogueText.textContent = '';
  dialogueLastChar = performance.now();
}

function skipDialogue() {
  if (dialogueCharIdx < dialogueFullText.length) {
    dialogueCharIdx = dialogueFullText.length;
    dialogueText.textContent = dialogueFullText;
  } else {
    advanceDialogue();
  }
}

function updateDialogue(now) {
  if (!dialogueActive) return;
  if (dialogueCharIdx < dialogueFullText.length) {
    if (now - dialogueLastChar > DIALOGUE_CHAR_SPEED) {
      dialogueCharIdx++;
      dialogueText.textContent = dialogueFullText.slice(0, dialogueCharIdx);
      dialogueLastChar = now;
      if (dialogueCharIdx % 2 === 0) playSfx('blip');
    }
  }
}

// ===== AUDIO (Web Audio API procedural) =====
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    game.audioCtx = audioCtx;
  } catch (e) { console.warn('Audio not available'); }
}

function playSfx(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  switch (type) {
    case 'blip': {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 800;
      g.gain.setValueAtTime(0.04, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.06);
      break;
    }
    case 'pickup': {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.25);
      break;
    }
    case 'confirm': {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.08);
      osc.frequency.setValueAtTime(784, now + 0.16);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.4);
      break;
    }
    case 'click': {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 600;
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.04);
      break;
    }
    case 'softstep': {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = rand(80, 120);
      g.gain.setValueAtTime(0.08, now);  // louder footsteps
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.12);
      break;
    }
    case 'bark': {
      // Dog bark - two quick "woof" sounds
      for (let i = 0; i < 2; i++) {
        const t0 = now + i * 0.15;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(280, t0);
        osc.frequency.exponentialRampToValueAtTime(180, t0 + 0.1);
        g.gain.setValueAtTime(0.12, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.12);
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        osc.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        osc.start(t0); osc.stop(t0 + 0.15);
      }
      break;
    }
  }
}

// Background ambient sound (looping)
let bgmNodes = [];
function startBgm(type) {
  stopBgm();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  if (type === 'menu') {
    // Soft warm pad
    [261.63, 329.63, 392.0].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = 0.03;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.2 + i * 0.1;
      lfoG.gain.value = 0.015;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); lfo.start(now);
      bgmNodes.push(osc, lfo);
    });
  } else if (type === 'chapter1') {
    // Warm piano-like ambient
    const notes = [261.63, 329.63, 392.0, 523.25];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.value = 0.02;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.15 + i * 0.05;
      lfoG.gain.value = 0.015;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); lfo.start(now);
      bgmNodes.push(osc, lfo);
    });
  } else if (type === 'chapter2') {
    // Ethereal synth
    [220, 277.18, 329.63, 440].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = 0.025;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.1 + i * 0.07;
      lfoG.gain.value = 0.012;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); lfo.start(now);
      bgmNodes.push(osc, lfo);
    });
  } else if (type === 'chapter3') {
    // Cold wind
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    noise.buffer = buf;
    noise.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    const g = audioCtx.createGain();
    g.gain.value = 0.06;
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.value = 0.3;
    lfoG.gain.value = 0.03;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
    noise.start(now); lfo.start(now);
    bgmNodes.push(noise, lfo);
  } else if (type === 'chapter4') {
    // Light guitar-like
    [196, 246.94, 293.66, 392].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.value = 0.022;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.2 + i * 0.06;
      lfoG.gain.value = 0.012;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); lfo.start(now);
      bgmNodes.push(osc, lfo);
    });
  } else if (type === 'ending') {
    // Touching piano - gentle chord progression
    [261.63, 329.63, 392.0, 523.25].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.value = 0.028;
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.12 + i * 0.04;
      lfoG.gain.value = 0.015;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); lfo.start(now);
      bgmNodes.push(osc, lfo);
    });
  }
}
function stopBgm() {
  bgmNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  bgmNodes = [];
}

// ===== THINKPAD UI OVERLAY =====
const tpIcon = document.getElementById('thinkpad-icon');
const tpIconCtx = tpIcon.getContext('2d');
const tpOverlay = document.getElementById('thinkpad-overlay');
const tpPhoto = document.getElementById('tp-photo');
const tpContinue = document.getElementById('tp-continue');
const tpMenu = document.getElementById('tp-menu');

// Mosaic levels for the photo (lower = more blurred)
// Stage 0: heavily blurred (start)
// Stage 1: chapter 1 cleared
// Stage 2: chapter 2 cleared
// Stage 3: chapter 3 cleared
// Stage 4: chapter 4 cleared
// Stage 5: ending - sharp
const MOSAIC_PIXEL_SIZE = [40, 24, 16, 10, 6, 1];  // 1 = sharp

let currentMosaicLevel = 0;
let cachedMosaicCanvas = null;

function getMosaicLevel() {
  if (game.gameComplete) return 5;
  // unlockedChapters = 1 means chapter 1 is available (none cleared yet)
  // unlockedChapters = 2 means chapter 1 cleared
  // etc.
  return Math.min(5, game.unlockedChapters - 1);
}

function renderMosaicPhoto(level) {
  if (!game.familyPhotoImg) return;
  const sz = MOSAIC_PIXEL_SIZE[level];
  const w = 240, h = 180;
  if (!cachedMosaicCanvas) cachedMosaicCanvas = document.createElement('canvas');
  cachedMosaicCanvas.width = w;
  cachedMosaicCanvas.height = h;
  const c = cachedMosaicCanvas.getContext('2d');
  c.imageSmoothingEnabled = false;

  if (sz <= 1) {
    // Sharp
    c.drawImage(game.familyPhotoImg, 0, 0, w, h);
  } else {
    // Pixelate: draw small then scale up
    const tmp = document.createElement('canvas');
    tmp.width = Math.max(1, Math.floor(w / sz));
    tmp.height = Math.max(1, Math.floor(h / sz));
    const tc = tmp.getContext('2d');
    tc.drawImage(game.familyPhotoImg, 0, 0, tmp.width, tmp.height);
    c.drawImage(tmp, 0, 0, w, h);
  }
}

function drawThinkPadIcon() {
  // Draw a small ThinkPad icon on the corner canvas
  const c = tpIconCtx;
  c.clearRect(0, 0, 32, 32);
  // ThinkPad body (laptop base)
  c.fillStyle = '#1a1a1a';
  c.fillRect(2, 6, 28, 18);
  // Screen
  c.fillStyle = '#2a4a6a';
  c.fillRect(4, 8, 24, 14);
  // Screen content - lighter when more unlocked
  const level = getMosaicLevel();
  if (level >= 4) {
    c.fillStyle = '#4a7aaa';
    c.fillRect(4, 8, 24, 14);
  }
  // ThinkPad logo area on screen (small "thinkpad" text)
  if (level >= 1) {
    c.fillStyle = '#f0f0f0';
    c.font = '3px monospace';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('think', 16, 14);
  }
  // The iconic red TrackPoint (between G H B keys)
  c.fillStyle = '#c84444';
  c.fillRect(15, 22, 2, 2);
  // Keyboard hint (small dots)
  c.fillStyle = '#3a3a3a';
  c.fillRect(6, 21, 1, 1);
  c.fillRect(9, 21, 1, 1);
  c.fillRect(12, 21, 1, 1);
  c.fillRect(18, 21, 1, 1);
  c.fillRect(21, 21, 1, 1);
  c.fillRect(24, 21, 1, 1);
  // Base lip
  c.fillStyle = '#3a3a3a';
  c.fillRect(0, 24, 32, 4);
}

function openThinkPad() {
  if (game.thinkpadOpen) return;
  // Only allow during gameplay scenes (not menu/transition)
  if (!game.scene || game.scene.constructor.name === 'MainMenu' ||
      game.scene.constructor.name === 'ClearAnimation' ||
      game.scene.constructor.name === 'Ending') return;

  // Animate the icon moving from top-right to center, then enlarging
  // Step 1: Get icon position
  const iconRect = tpIcon.getBoundingClientRect();
  const containerRect = document.getElementById('game-container').getBoundingClientRect();
  const iconCenterX = iconRect.left + iconRect.width / 2 - containerRect.left;
  const iconCenterY = iconRect.top + iconRect.height / 2 - containerRect.top;
  const containerCenterX = containerRect.width / 2;
  const containerCenterY = containerRect.height / 2;

  // Step 2: Calculate translation needed
  const translateX = containerCenterX - iconCenterX;
  const translateY = containerCenterY - iconCenterY;

  // Step 3: Animate icon moving to center + scaling up
  tpIcon.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease 0.3s';
  tpIcon.style.transform = `translate(${translateX}px, ${translateY}px) scale(8)`;
  tpIcon.style.opacity = '0';
  tpIcon.style.zIndex = '200';

  // Step 4: After animation, show overlay and reset icon
  setTimeout(() => {
    game.thinkpadOpen = true;
    tpOverlay.classList.add('active');
    const level = getMosaicLevel();
    renderMosaicPhoto(level);
    if (cachedMosaicCanvas) {
      tpPhoto.src = cachedMosaicCanvas.toDataURL();
    }
    playSfx('click');

    // Reset icon position (hidden for now)
    tpIcon.style.transition = 'none';
    tpIcon.style.transform = '';
    tpIcon.style.opacity = '';
    tpIcon.style.zIndex = '10';
    tpIcon.style.display = 'none';
  }, 500);
}
function closeThinkPad() {
  game.thinkpadOpen = false;
  tpOverlay.classList.remove('active');
  playSfx('click');
  // Restore icon with fade-in
  setTimeout(() => {
    tpIcon.style.display = 'block';
    tpIcon.style.transition = 'opacity 0.3s ease';
    tpIcon.style.opacity = '0';
    setTimeout(() => {
      tpIcon.style.opacity = '0.85';
    }, 50);
  }, 300);
}

tpIcon.addEventListener('click', () => {
  initAudio();
  if (game.thinkpadOpen) closeThinkPad();
  else openThinkPad();
});
tpContinue.addEventListener('click', () => {
  closeThinkPad();
});
tpMenu.addEventListener('click', () => {
  closeThinkPad();
  changeScene('MainMenu');
});

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(50, timestamp - lastTime);  // cap dt
  lastTime = timestamp;

  if (game.transitioning) {
    game.transitionAlpha += dt / 400;
    if (game.transitionAlpha >= 1 && game.nextScene) {
      applySceneChange();
    }
    if (game.transitionAlpha >= 1.5) {
      game.transitioning = false;
      game.transitionAlpha = 0;
    }
  }

  if (game.scene && !game.thinkpadOpen) {
    if (!game.transitioning) {
      game.scene.update(dt);
    }
  }
  updateDialogue(timestamp);
  updateSubtitle(dt);

  // Render
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CW, CH);
  if (game.scene) game.scene.render();

  // Transition fade
  if (game.transitioning) {
    let alpha = 0;
    if (game.transitionAlpha < 0.5) {
      alpha = game.transitionAlpha * 2;  // fade out
    } else if (game.transitionAlpha > 1) {
      alpha = (1.5 - game.transitionAlpha) * 2;  // fade in
    } else {
      alpha = 1;
    }
    ctx.fillStyle = `rgba(0,0,0,${clamp(alpha, 0, 1)})`;
    ctx.fillRect(0, 0, CW, CH);
  }

  // Update ThinkPad icon
  drawThinkPadIcon();
  // Position ThinkPad icon at the top-right of the game canvas (not viewport)
  positionThinkPadIcon();
  // Show/hide ThinkPad icon based on scene
  const sceneName = game.scene ? game.scene.constructor.name : '';
  if (sceneName === 'MainMenu' || sceneName === '') {
    tpIcon.style.display = 'none';
  } else {
    tpIcon.style.display = 'block';
  }

  requestAnimationFrame(gameLoop);
}

// Position the ThinkPad icon at the top-right corner of the game canvas
function positionThinkPadIcon() {
  const canvasRect = canvas.getBoundingClientRect();
  const containerRect = document.getElementById('game-container').getBoundingClientRect();
  // The icon should be at the top-right of the canvas, with some padding
  const padding = 16;
  const iconSize = 48;
  const rightOffset = containerRect.right - canvasRect.right + padding;
  const topOffset = canvasRect.top - containerRect.top + padding;
  tpIcon.style.top = topOffset + 'px';
  tpIcon.style.right = rightOffset + 'px';
  tpIcon.style.width = iconSize + 'px';
  tpIcon.style.height = iconSize + 'px';
}

// Re-position on window resize
window.addEventListener('resize', positionThinkPadIcon);

// ===== INIT =====
function init() {
  loadGame();
  // Load family photo
  const img = new Image();
  img.onload = () => {
    game.familyPhotoImg = img;
    document.getElementById('loading-fill').style.width = '70%';
    // Initialize audio and load buffers
    initAudio();
    if (audioCtx) {
      loadAudioBuffers().then(() => {
        document.getElementById('loading-fill').style.width = '100%';
        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
          changeScene('MainMenu');
          requestAnimationFrame(gameLoop);
        }, 300);
      });
    } else {
      document.getElementById('loading-fill').style.width = '100%';
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        changeScene('MainMenu');
        requestAnimationFrame(gameLoop);
      }, 300);
    }
  };
  img.onerror = () => {
    document.getElementById('loading').innerHTML = '<div style="color:#c84444">Failed to load family photo. Please check the file.</div>';
  };
  img.src = FAMILY_PHOTO_DATA_URI;

  // Click anywhere to init audio (browser policy)
  document.addEventListener('click', () => {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });
  document.addEventListener('keydown', () => {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });

  // ESC closes thinkpad
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && game.thinkpadOpen) {
      closeThinkPad();
    }
    // Space advances dialogue
    if ((e.key === ' ' || e.key === 'Enter') && dialogueActive) {
      skipDialogue();
      e.preventDefault();
    }
  });

// ===== MAIN MENU SCENE =====
class MainMenu extends Scene {
  init() {
    this.selectedIndex = 0;
    this.titlePulse = 0;
    this.inputCooldown = 0;
    // Smooth hover values for each chapter button
    this.btnHover = [0, 0, 0, 0];
    this.resetHover = 0;
    this.mouseX = 0;
    this.mouseY = 0;
    startBgm('menu');
  }
  get chapters() {
    return [
      { id: 1, name: 'Farewell', icon: SPR_ICON_CH1, subtitle: 'Shenzhen, 2025' },
      { id: 2, name: 'The Crossing', icon: SPR_ICON_CH2, subtitle: 'Above the Pacific' },
      { id: 3, name: 'Snow', icon: SPR_ICON_CH3, subtitle: 'Toronto Winter' },
      { id: 4, name: 'Weaving', icon: SPR_ICON_CH4, subtitle: 'A New Map' },
    ];
  }
  update(dt) {
    this.titlePulse += dt / 1000;
    this.inputCooldown = Math.max(0, this.inputCooldown - dt);

    if (this.inputCooldown === 0) {
      if (keys['arrowup'] || keys['w']) {
        this.selectedIndex = (this.selectedIndex - 1 + 4) % 4;
        this.inputCooldown = 200;
        playSfx('click');
      }
      if (keys['arrowdown'] || keys['s']) {
        this.selectedIndex = (this.selectedIndex + 1) % 4;
        this.inputCooldown = 200;
        playSfx('click');
      }
    }

    // Smooth hover animation for chapter buttons
    const startY = 240;
    const btnH = 60;
    let hoveredIdx = -1;
    for (let i = 0; i < 4; i++) {
      const cy = startY + i * btnH;
      if (this.mouseX > 280 && this.mouseX < 680 && this.mouseY > cy && this.mouseY < cy + btnH - 10) {
        hoveredIdx = i;
        break;
      }
    }
    for (let i = 0; i < 4; i++) {
      const target = (i === hoveredIdx || i === this.selectedIndex) ? 1 : 0;
      this.btnHover[i] = lerp(this.btnHover[i], target, 0.15);
    }
    // Reset button hover
    const resetTarget = (this.mouseX > 20 && this.mouseX < 160 && this.mouseY > CH - 50 && this.mouseY < CH - 20) ? 1 : 0;
    this.resetHover = lerp(this.resetHover, resetTarget, 0.15);
  }
  onMouseMove(x, y) {
    this.mouseX = x;
    this.mouseY = y;
  }
  onKey(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      const ch = this.chapters[this.selectedIndex];
      if (ch.id <= game.unlockedChapters) {
        playSfx('confirm');
        if (ch.id === 1) changeScene('Chapter1');
        else if (ch.id === 2) changeScene('Chapter2');
        else if (ch.id === 3) changeScene('Chapter3');
        else if (ch.id === 4) changeScene('Chapter4');
      } else {
        playSfx('blip');
      }
    }
  }
  onMouseDown(x, y) {
    // Check chapter button clicks
    const startY = 240;
    const btnH = 60;
    for (let i = 0; i < 4; i++) {
      const cy = startY + i * btnH;
      if (x > 280 && x < 680 && y > cy && y < cy + btnH - 10) {
        this.selectedIndex = i;
        const ch = this.chapters[i];
        if (ch.id <= game.unlockedChapters) {
          playSfx('confirm');
          if (ch.id === 1) changeScene('Chapter1');
          else if (ch.id === 2) changeScene('Chapter2');
          else if (ch.id === 3) changeScene('Chapter3');
          else if (ch.id === 4) changeScene('Chapter4');
        } else {
          playSfx('blip');
        }
      }
    }
    // Reset progress button (bottom-left corner)
    if (x > 20 && x < 160 && y > CH - 50 && y < CH - 20) {
      // Reset progress
      game.unlockedChapters = 1;
      game.gameComplete = false;
      saveGame();
      playSfx('confirm');
      showSubtitle('Progress reset', 2000);
    }
  }
  render() {
    // Background - warm dark gradient
    const g = ctx.createLinearGradient(0, 0, 0, CH);
    g.addColorStop(0, '#1a1208');
    g.addColorStop(0.5, '#2a1a0a');
    g.addColorStop(1, '#1a0a04');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, CW, CH);

    // Subtle pixel grid pattern
    ctx.fillStyle = 'rgba(201,168,106,0.04)';
    for (let x = 0; x < CW; x += 32) ctx.fillRect(x, 0, 1, CH);
    for (let y = 0; y < CH; y += 32) ctx.fillRect(0, y, CW, 1);

    // Floating pixel particles (dust motes)
    const t = this.titlePulse;
    ctx.fillStyle = 'rgba(201,168,106,0.25)';
    for (let i = 0; i < 30; i++) {
      const px = (i * 137 + t * 8) % CW;
      const py = (i * 71 + Math.sin(t + i) * 20 + t * 12) % CH;
      ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
    }

    // Title
    const titleY = 90;
    const pulse = Math.sin(t * 1.5) * 0.1 + 0.9;
    ctx.save();
    ctx.translate(CW / 2, titleY);
    ctx.scale(pulse, pulse);
    // Title shadow
    drawText('THE JOURNEY', -3, 3, {
      color: 'rgba(0,0,0,0.6)', font: 'bold 56px "Courier New", monospace',
      align: 'center', baseline: 'middle',
    });
    // Title glow
    ctx.shadowColor = '#c9a86a';
    ctx.shadowBlur = 20;
    drawText('THE JOURNEY', 0, 0, {
      color: '#f0d090', font: 'bold 56px "Courier New", monospace',
      align: 'center', baseline: 'middle',
    });
    ctx.shadowBlur = 0;
    ctx.restore();

    // Subtitle
    drawText('Dedicated to Yifu Wang', CW / 2, 160, {
      color: '#a08868', font: '16px "Courier New", monospace',
      align: 'center', baseline: 'middle',
    });
    // Small heart-like pixel decoration
    drawText('- Father\'s Day 2026 -', CW / 2, 190, {
      color: '#7a6850', font: '12px "Courier New", monospace',
      align: 'center', baseline: 'middle',
    });

    // Chapter buttons
    const startY = 240;
    const btnH = 60;
    for (let i = 0; i < 4; i++) {
      const ch = this.chapters[i];
      const cy = startY + i * btnH;
      const locked = ch.id > game.unlockedChapters;
      const completed = ch.id < game.unlockedChapters;
      const h = this.btnHover[i];  // smooth 0-1

      // Button background (smooth hover)
      if (locked) {
        ctx.fillStyle = 'rgba(40,30,20,0.4)';
        ctx.fillRect(280, cy, 400, btnH - 10);
      } else {
        // Smooth color transition on hover
        const bgAlpha = lerp(0.3, 0.18, h);
        ctx.fillStyle = `rgba(${lerp(60, 201, h)}, ${lerp(40, 168, h)}, ${lerp(20, 106, h)}, ${bgAlpha})`;
        ctx.fillRect(280, cy, 400, btnH - 10);
        // Border (smooth)
        ctx.strokeStyle = h > 0.5 ? '#f0d090' : '#c9a86a';
        ctx.lineWidth = lerp(1, 2, h);
        ctx.strokeRect(280, cy, 400, btnH - 10);
        // Glow on hover
        if (h > 0.01) {
          ctx.shadowColor = `rgba(240, 208, 144, ${h * 0.4})`;
          ctx.shadowBlur = 15 * h;
          ctx.strokeRect(280, cy, 400, btnH - 10);
          ctx.shadowBlur = 0;
        }
      }

      // Chapter icon
      const iconScale = 1;
      const iconX = 300;
      const iconY = cy + 8;
      if (locked) {
        ctx.globalAlpha = 0.3;
        drawSprite(ctx, ch.icon, { 'k': '#5a5040', '.': null }, iconX, iconY, iconScale);
        ctx.globalAlpha = 1;
      } else {
        drawSprite(ctx, ch.icon, PAL_ICON, iconX, iconY, iconScale);
      }

      // Chapter number + name
      const textColor = locked ? '#5a5040' : (h > 0.5 ? '#fff5d0' : '#c9a86a');
      drawText(`Chapter ${ch.id}: ${ch.name}`, 350, cy + 12, {
        color: textColor, font: `bold ${lerp(16, 17, h).toFixed(0)}px "Courier New", monospace`,
      });
      drawText(ch.subtitle, 350, cy + 32, {
        color: locked ? '#3a3020' : '#8a7050', font: '11px "Courier New", monospace',
      });

      // Status label on right
      if (locked) {
        drawText('[ LOCKED ]', 620, cy + 22, {
          color: '#5a4030', font: '10px "Courier New", monospace', align: 'center',
        });
      } else if (completed) {
        drawText('✓', 620, cy + 18, {
          color: '#7aa060', font: 'bold 16px "Courier New", monospace', align: 'center',
        });
      } else if (this.btnHover[i] > 0.3) {

// ===== CLEAR ANIMATION SCENE =====
// Shows after a chapter is completed - ThinkPad opens, reveals memory image, shows chapter title
class ClearAnimation extends Scene {
  init(data) {
    this.phase = 0;  // 0: fade to black, 1: ThinkPad opens, 2: show memory, 3: show buttons
    this.timer = 0;
    this.chapterId = data.chapterId;
    this.nextSceneName = data.nextSceneName;
    this.thinkpadScale = 0.3;
    this.thinkpadAlpha = 0;
    this.memoryAlpha = 0;
    this.textAlpha = 0;
    this.showButtons = false;
    // Button hover animation values (for smooth transitions)
    this.btnHoverMenu = 0;      // 0-1 smooth hover state
    this.btnHoverContinue = 0;
    this.btnHoverEnding = 0;
    startBgm('menu');
  }
  update(dt) {
    this.timer += dt;
    if (this.phase === 0) {
      // Fade to black, then bring in ThinkPad
      if (this.timer > 600) {
        this.phase = 1;
        this.timer = 0;
      }
    } else if (this.phase === 1) {
      // ThinkPad appears in center, opens upward
      this.thinkpadAlpha = Math.min(1, this.timer / 400);
      this.thinkpadScale = lerp(0.3, 1.0, Math.min(1, this.timer / 600));
      if (this.timer > 1200) {
        this.phase = 2;
        this.timer = 0;
        playSfx('confirm');
      }
    } else if (this.phase === 2) {
      // Show memory image + chapter title text
      this.memoryAlpha = Math.min(1, this.timer / 800);
      this.textAlpha = Math.min(1, (this.timer - 400) / 600);
      if (this.timer > 2500) {
        this.phase = 3;
        this.timer = 0;
        this.showButtons = true;
      }
    }

    // Smooth hover animation for buttons (lerp towards target)
    if (this.showButtons) {
      const targetMenu = this.hoveredButton === 'menu' ? 1 : 0;
      const targetContinue = this.hoveredButton === 'continue' ? 1 : 0;
      const targetEnding = this.hoveredButton === 'ending' ? 1 : 0;
      const lerpSpeed = 0.15;
      this.btnHoverMenu = lerp(this.btnHoverMenu, targetMenu, lerpSpeed);
      this.btnHoverContinue = lerp(this.btnHoverContinue, targetContinue, lerpSpeed);
      this.btnHoverEnding = lerp(this.btnHoverEnding, targetEnding, lerpSpeed);
    }
  }
  render() {
    // Black background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CW, CH);

    const cx = CW / 2;
    const cy = CH / 2;

    if (this.phase >= 1) {
      // Draw ThinkPad centered
      ctx.globalAlpha = this.thinkpadAlpha;
      const sz = spriteSize(SPR_THINKPAD_LARGE);
      const scale = this.thinkpadScale * 4;
      const drawX = cx - sz.w * scale / 2;
      const drawY = cy - sz.h * scale / 2 - 30;
      drawSprite(ctx, SPR_THINKPAD_LARGE, PAL_THINKPAD_LARGE, drawX, drawY, scale);

      // Memory image inside ThinkPad screen
      if (this.phase >= 2 && this.memoryAlpha > 0) {
        ctx.globalAlpha = this.memoryAlpha;
        const memImg = this.getMemoryImage();
        if (memImg) {
          // Draw a stylized memory scene inside the ThinkPad screen
          const screenX = drawX + 5 * scale;
          const screenY = drawY + 6 * scale;
          const screenW = 70 * scale;
          const screenH = 12 * scale;
          ctx.save();
          ctx.beginPath();
          ctx.rect(screenX, screenY, screenW, screenH);
          ctx.clip();
          memImg(screenX, screenY, screenW, screenH);
          ctx.restore();
        }
        ctx.globalAlpha = 1;
      }
      ctx.globalAlpha = 1;

      // Chapter title text below ThinkPad
      if (this.phase >= 2 && this.textAlpha > 0) {
        ctx.globalAlpha = this.textAlpha;
        const titles = {
          1: '2025, Shenzhen',
          2: 'Above the Pacific',
          3: 'Toronto Winter',
          4: 'A Map of Memories',
        };
        drawText(titles[this.chapterId] || '', cx, cy + 140, {
          color: '#f0d090', font: 'bold 22px "Courier New", monospace',
          align: 'center', baseline: 'middle',
          shadow: true,
        });
        ctx.globalAlpha = 1;
      }
    }

    // Buttons
    if (this.showButtons) {
      this.drawButtons();
    }
  }
  getMemoryImage() {
    // Returns a function that draws the memory scene for this chapter
    const drawers = {
      1: (x, y, w, h) => {
        // Shenzhen room - warm orange/brown tones
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(x, y, w, h);
        // Window
        ctx.fillStyle = '#f5b878';
        ctx.fillRect(x + w * 0.1, y + h * 0.1, w * 0.3, h * 0.4);
        // Bed
        ctx.fillStyle = '#5a3a2a';
        ctx.fillRect(x + w * 0.5, y + h * 0.5, w * 0.4, h * 0.3);
        // Floor
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(x, y + h * 0.8, w, h * 0.2);
      },
      2: (x, y, w, h) => {
        // Sky with clouds
        const g = ctx.createLinearGradient(x, y, x, y + h);
        g.addColorStop(0, '#f5b878');
        g.addColorStop(1, '#e8c890');
        ctx.fillStyle = g;
        ctx.fillRect(x, y, w, h);
        // Clouds
        ctx.fillStyle = '#fff5e0';
        ctx.fillRect(x + w * 0.1, y + h * 0.3, w * 0.3, h * 0.15);
        ctx.fillRect(x + w * 0.5, y + h * 0.6, w * 0.35, h * 0.18);
      },
      3: (x, y, w, h) => {
        // Snow scene
        const g = ctx.createLinearGradient(x, y, x, y + h);
        g.addColorStop(0, '#3a4a6a');
        g.addColorStop(1, '#6a7a9a');
        ctx.fillStyle = g;
        ctx.fillRect(x, y, w, h);
        // Snow ground
        ctx.fillStyle = '#d8e0e8';
        ctx.fillRect(x, y + h * 0.7, w, h * 0.3);
        // Snowflakes
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 30; i++) {
          ctx.fillRect(x + (i * 37) % w, y + (i * 23) % h, 2, 2);
        }
      },
      4: (x, y, w, h) => {
        // Toronto map - simplified
        ctx.fillStyle = '#a8b8a0';
        ctx.fillRect(x, y, w, h);
        // Water
        ctx.fillStyle = '#5a7a9a';
        ctx.fillRect(x, y + h * 0.7, w, h * 0.3);
        // Roads
        ctx.strokeStyle = '#c0b090';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y + h * 0.4);
        ctx.lineTo(x + w, y + h * 0.4);
        ctx.moveTo(x + w * 0.3, y);
        ctx.lineTo(x + w * 0.3, y + h);
        ctx.stroke();
      },
    };
    return drawers[this.chapterId];
  }
  drawButtons() {
    const isLastChapter = this.chapterId === 4;
    const cy = CH - 80;

    if (isLastChapter) {
      // Only "Continue to Ending"
      const bx = CW / 2 - 100;
      const by = cy;
      const h = this.btnHoverEnding;  // smooth 0-1
      // Hover glow effect (smooth)
      if (h > 0.01) {
        ctx.shadowColor = `rgba(240, 208, 144, ${h * 0.6})`;
        ctx.shadowBlur = 20 * h;
      }
      ctx.fillStyle = `rgba(${lerp(60, 201, h)}, ${lerp(50, 168, h)}, ${lerp(30, 106, h)}, ${lerp(0.5, 0.4, h)})`;
      ctx.fillRect(bx, by, 200, 36);
      ctx.strokeStyle = h > 0.5 ? '#f0d090' : '#c9a86a';
      ctx.lineWidth = lerp(2, 3, h);
      ctx.strokeRect(bx, by, 200, 36);
      ctx.shadowBlur = 0;
      drawText('CONTINUE TO ENDING', CW / 2, by + 18, {
        color: h > 0.5 ? '#fff5d0' : '#f0d090',
        font: `bold ${lerp(12, 14, h).toFixed(0)}px "Courier New", monospace`,
        align: 'center', baseline: 'middle',
      });
    } else {
      // Two buttons: Back to Menu / Continue
      const bw = 180;
      const gap = 30;
      const totalW = bw * 2 + gap;
      const startX = (CW - totalW) / 2;

      const bx1 = startX;
      const bx2 = startX + bw + gap;
      const h1 = this.btnHoverMenu;
      const h2 = this.btnHoverContinue;

      // Button 1
      if (h1 > 0.01) {
        ctx.shadowColor = `rgba(240, 208, 144, ${h1 * 0.6})`;
        ctx.shadowBlur = 20 * h1;
      }
      ctx.fillStyle = `rgba(${lerp(60, 201, h1)}, ${lerp(50, 168, h1)}, ${lerp(30, 106, h1)}, ${lerp(0.5, 0.4, h1)})`;
      ctx.fillRect(bx1, cy, bw, 36);
      ctx.strokeStyle = h1 > 0.5 ? '#f0d090' : '#c9a86a';
      ctx.lineWidth = lerp(2, 3, h1);
      ctx.strokeRect(bx1, cy, bw, 36);
      ctx.shadowBlur = 0;
      drawText('BACK TO MENU', bx1 + bw / 2, cy + 18, {
        color: h1 > 0.5 ? '#fff5d0' : '#f0d090',
        font: `bold ${lerp(12, 14, h1).toFixed(0)}px "Courier New", monospace`,
        align: 'center', baseline: 'middle',
      });

      // Button 2
      if (h2 > 0.01) {
        ctx.shadowColor = `rgba(240, 208, 144, ${h2 * 0.6})`;
        ctx.shadowBlur = 20 * h2;
      }
      ctx.fillStyle = `rgba(${lerp(60, 201, h2)}, ${lerp(50, 168, h2)}, ${lerp(30, 106, h2)}, ${lerp(0.5, 0.4, h2)})`;
      ctx.fillRect(bx2, cy, bw, 36);
      ctx.strokeStyle = h2 > 0.5 ? '#f0d090' : '#c9a86a';
      ctx.lineWidth = lerp(2, 3, h2);
      ctx.strokeRect(bx2, cy, bw, 36);
      ctx.shadowBlur = 0;
      drawText('NEXT CHAPTER', bx2 + bw / 2, cy + 18, {
        color: h2 > 0.5 ? '#fff5d0' : '#f0d090',
        font: `bold ${lerp(12, 14, h2).toFixed(0)}px "Courier New", monospace`,
        align: 'center', baseline: 'middle',
      });
    }
  }
  onMouseMove(x, y) {
    if (!this.showButtons) return;
    const isLastChapter = this.chapterId === 4;
    const cy = CH - 80;
    if (isLastChapter) {
      const bx = CW / 2 - 100;
      this.hoveredButton = (x >= bx && x <= bx + 200 && y >= cy && y <= cy + 36) ? 'continue' : null;
    } else {
      const bw = 180, gap = 30;
      const totalW = bw * 2 + gap;
      const startX = (CW - totalW) / 2;
      const bx1 = startX, bx2 = startX + bw + gap;
      if (x >= bx1 && x <= bx1 + bw && y >= cy && y <= cy + 36) this.hoveredButton = 'menu';
      else if (x >= bx2 && x <= bx2 + bw && y >= cy && y <= cy + 36) this.hoveredButton = 'continue';
      else this.hoveredButton = null;
    }
  }
  onMouseDown(x, y) {
    if (!this.showButtons) return;
    const isLastChapter = this.chapterId === 4;
    const cy = CH - 80;
    if (isLastChapter) {
      const bx = CW / 2 - 100;
      if (x >= bx && x <= bx + 200 && y >= cy && y <= cy + 36) {
        playSfx('confirm');
        changeScene('Ending');
      }
    } else {
      const bw = 180, gap = 30;
      const totalW = bw * 2 + gap;
      const startX = (CW - totalW) / 2;
      const bx1 = startX, bx2 = startX + bw + gap;
      if (x >= bx1 && x <= bx1 + bw && y >= cy && y <= cy + 36) {
        playSfx('confirm');
        changeScene('MainMenu');
      } else if (x >= bx2 && x <= bx2 + bw && y >= cy && y <= cy + 36) {
        playSfx('confirm');
        changeScene(this.nextSceneName);
      }
    }
  }
  onKey(e) {
    if (!this.showButtons) return;
    if (e.key === 'Enter' || e.key === ' ') {
      if (this.chapterId === 4) {
        playSfx('confirm');
        changeScene('Ending');
      } else {
        playSfx('confirm');
        changeScene(this.nextSceneName);
      }
    } else if (e.key === 'Escape') {
      playSfx('confirm');
      changeScene('MainMenu');
    }
  }
  cleanup() { stopBgm(); }
}
SCENES.ClearAnimation = ClearAnimation;

// Top-down room. Player (father) moves around, interacts with NPCs and items.

    // NPCs: Mother, Son, Sister, Tracy (dog)

      },

      },
      { name: 'Tracy', x: 750, y: 380, sprite: SPR_TRACY, palette: PAL_TRACY,
        tx: 750, ty: 380, walkPhase: 0, interacted: 0, speed: 0.4, isDog: true,
        dialogues: [
          ['[Tracy wags her tail]', "We can't take you to the new home... Goodbye, little one."],
          ['[Tracy rubs against your leg]', 'Tracy seems to know we\'re leaving.'],
        ],
      },
    ];
    // Items
    this.items = [
      { name: 'ThinkPad', x: 380, y: 360, sprite: SPR_THINKPAD_ITEM, palette: PAL_THINKPAD_ITEM,
        collected: false, deposited: false, scale: 1.5,
        pickupText: 'ThinkPad - your old friend. From Shenzhen to Toronto, it stays with you through work and struggle.',
      },
      { name: 'Insta360', x: 620, y: 170, sprite: SPR_INSTA360, palette: PAL_INSTA360,
        collected: false, deposited: false, scale: 1.5,
        pickupText: 'Insta360 - the camera that captured a thousand moments.',
      },
    ];
    // Backpack in center of floor
    this.backpack = { x: 480, y: 290, scale: 2.0 };
    this.heldItem = null;  // name of currently held item
    this.depositedCount = 0;
    this.cleared = false;
    this.interactionCooldown = 0;
    this.npcMoveTimer = 0;
    this.footstepActive = false;
    startBgm('chapter1');
  }
  update(dt) {
    // Player movement
    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    if (keys['arrowup'] || keys['w']) dy -= 1;
    if (keys['arrowdown'] || keys['s']) dy += 1;
    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len; dy /= len;
      this.player.x += dx * this.player.speed * dt / 16;
      this.player.y += dy * this.player.speed * dt / 16;
      this.player.walkPhase += dt / 100;
      this.player.moving = true;
      // Wood footstep - start loop if not playing (use uploaded audio)
      if (!this.footstepActive) {
        this.footstepHandle = playAudioBuffer('wood_footsteps', { loop: true, volume: 0.4 });
        this.footstepActive = true;
      }
      // Update facing
      if (Math.abs(dx) > Math.abs(dy)) {
        this.player.facing = dx > 0 ? 'right' : 'left';
      } else {
        this.player.facing = dy > 0 ? 'down' : 'up';
      }
    } else {
      this.player.moving = false;
      // Stop footsteps
      if (this.footstepActive) {
        stopAudioSource(this.footstepHandle);
        this.footstepHandle = null;
        this.footstepActive = false;
      }
    }
    // Clamp to room
    this.player.x = clamp(this.player.x, 60, CW - 60);
    this.player.y = clamp(this.player.y, 100, CH - 60);

    // NPC AI - wandering + their own footsteps
    this.npcMoveTimer += dt;
    if (this.npcMoveTimer > 2000) {
      this.npcMoveTimer = 0;
      this.npcs.forEach(npc => {
        if (Math.random() < 0.7) {
          npc.tx = clamp(npc.x + rand(-100, 100), 80, CW - 80);
          npc.ty = clamp(npc.y + rand(-80, 80), 120, CH - 80);
        }
      });
    }
    this.npcs.forEach(npc => {
      // Decrement sit timer (for Tracy)
      if (npc.sitTimer > 0) {
        npc.sitTimer -= dt;
        if (npc.sitTimer <= 0) {
          npc.sitTimer = 0;
        }
      }
      const ddx = npc.tx - npc.x, ddy = npc.ty - npc.y;
      const d = Math.hypot(ddx, ddy);
      const wasMoving = npc.moving;
      // Don't move if sitting
      if (npc.sitTimer > 0) {
        npc.moving = false;
      } else if (d > 2) {
        npc.x += (ddx / d) * npc.speed * dt / 16;
        npc.y += (ddy / d) * npc.speed * dt / 16;
        npc.walkPhase += dt / 120;
        npc.moving = true;
        // NPC wood footstep - softer, slightly different timing per NPC
        if (!npc.isDog) {
          if (Math.floor(npc.walkPhase / Math.PI) !== npc.lastStep) {
            npc.lastStep = Math.floor(npc.walkPhase / Math.PI);
            // Soft wood thump for NPC
            if (audioCtx) {
              const now = audioCtx.currentTime;
              const osc = audioCtx.createOscillator();
              const g = audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(rand(100, 140), now);
              osc.frequency.exponentialRampToValueAtTime(50, now + 0.07);
              g.gain.setValueAtTime(0.08, now);
              g.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
              osc.connect(g); g.connect(audioCtx.destination);
              osc.start(now); osc.stop(now + 0.1);
            }
          }
        }
      } else {
        npc.moving = false;
      }
    });

    // Interaction cooldown
    this.interactionCooldown = Math.max(0, this.interactionCooldown - dt);

    // Check for nearby interactable
    let nearby = null;
    let nearbyType = null;
    for (const npc of this.npcs) {
      if (dist(this.player.x, this.player.y, npc.x, npc.y) < 50) {
        nearby = npc; nearbyType = 'npc'; break;
      }
    }
    if (!nearby) {
      for (const item of this.items) {
        if (!item.collected && dist(this.player.x, this.player.y, item.x, item.y) < 50) {
          nearby = item; nearbyType = 'item'; break;
        }
      }
    }
    if (!nearby && this.heldItem) {
      if (dist(this.player.x, this.player.y, this.backpack.x, this.backpack.y) < 60) {
        nearby = this.backpack; nearbyType = 'backpack';
      }
    }
    this.nearby = nearby;
    this.nearbyType = nearbyType;

    if (nearby) {
      const promptText = {
        'npc': `Press SPACE to talk to ${nearby.name}`,
        'item': `Press SPACE to pick up ${nearby.name}`,
        'backpack': 'Press SPACE to put item in backpack',
      }[nearbyType];
      showPrompt(promptText);
    } else {
      hidePrompt();
    }
  }
  onKey(e) {
    if (dialogueActive) return;
    if (e.key === ' ' || e.key === 'Enter') {
      if (this.nearby && this.interactionCooldown === 0) {
        this.interactionCooldown = 300;
        this.interact(this.nearby, this.nearbyType);
      }
    }
  }
  interact(target, type) {
    if (type === 'npc') {
      const dialogueSet = target.dialogues[target.interacted > 0 ? 1 : 0];
      const line = dialogueSet[target.interacted % dialogueSet.length];
      showDialogue(target.name, line);
      target.interacted++;
      // Tracy - play real bark audio (cycle between bark1 and bark2) + sit animation
      if (target.isDog) {
        // Cycle through bark sounds: 1st interaction = bark1, 2nd = bark2, 3rd = bark1, etc.
        game.tracyInteractCount++;
        const barkName = (game.tracyInteractCount % 2 === 1) ? 'bark1' : 'bark2';
        playAudioBuffer(barkName, { volume: 0.7 });
        // Make Tracy sit for 3 seconds
        target.sitTimer = 3000;
        // Stop her from wandering while sitting
        target.tx = target.x;
        target.ty = target.y;
      } else {
        playSfx('blip');
      }
    } else if (type === 'item') {
      target.collected = true;
      this.heldItem = target.name;
      showDialogue('', target.pickupText);
      playSfx('pickup');
    } else if (type === 'backpack') {
      // Deposit held item
      const item = this.items.find(i => i.name === this.heldItem);
      if (item) {
        item.deposited = true;
        this.depositedCount++;
        const itemName = this.heldItem;
        this.heldItem = null;
        playSfx('confirm');
        if (this.depositedCount >= 2 && !this.cleared) {
          this.cleared = true;
          showDialogue('', 'Ready. Let\'s go.', () => {
            // Unlock chapter 2
            if (game.unlockedChapters < 2) {
              game.unlockedChapters = 2;
              saveGame();
            }
            changeScene('ClearAnimation', { chapterId: 1, nextSceneName: 'Chapter2' });
          });
        } else {
          showDialogue('', `${itemName} stored. ${2 - this.depositedCount} more to pack.`);
        }
      }
    }
  }
  render() {
    // Room background - warm Shenzhen room
    this.drawRoom();

    // Sort entities by y for proper depth

// ===== CHAPTER 2: THE CROSSING =====
// Airplane window view. Clouds scroll at different speeds. Memory text appears.
// Light interaction: clicking clouds makes them puff. Auto-completes after ~75 seconds.
class Chapter2 extends Scene {
  init() {
    this.elapsed = 0;
    this.duration = 75000;  // 75 seconds
    this.cloudLayers = [
      { speed: 0.3, clouds: this.makeClouds(8, 0.3, 50), color: '#fff5e0', yBase: 100 },
      { speed: 0.7, clouds: this.makeClouds(10, 0.5, 80), color: '#f0d8b0', yBase: 200 },
      { speed: 1.2, clouds: this.makeClouds(12, 0.8, 120), color: '#d8b890', yBase: 320 },
    ];

      '12 hours of flying...',
      'Strange clouds outside the window...',
      'Wonder what Toronto looks like...',
      'But we know, a new story begins...',
    ];
    this.currentLineIdx = 0;
    this.lineTimer = 0;
    this.lineInterval = 7000;  // 7s between lines
    this.windowShake = 0;
    this.cloudPuffs = [];  // {x, y, age}
    this.completed = false;
    this.canFinish = false;

    // Fog/breath mechanic state
    this.fogCharge = 0;       // 0-1, how much the charge circle is filled
    this.isChargingFog = false;  // is space being held?
    this.chargeX = 0;          // mouse position when charging
    this.chargeY = 0;
    this.fogCircles = [];      // array of {x, y, radius, alpha, age, drawMask}
    // drawMask is a canvas that tracks where player has drawn (to make transparent)
    this.mouseX = 0;
    this.mouseY = 0;
    this.isDrawingOnFog = false;  // is player drawing on fog with mouse?
    this.fogHintShown = false;    // has the fog hint been shown?

    startBgm('chapter2');
    // Show first memory line immediately
    showSubtitle(this.memoryLines[0], 6000);
  }
  makeClouds(count, scale, baseSize) {
    const clouds = [];
    for (let i = 0; i < count; i++) {
      clouds.push({
        x: rand(-200, CW + 200),
        y: rand(-30, 80),
        size: baseSize + rand(-15, 25),
        scale: scale,
        puffs: Math.floor(rand(3, 7)),
      });
    }
    return clouds;
  }
  update(dt) {
    this.elapsed += dt;
    // Move clouds
    this.cloudLayers.forEach(layer => {
      layer.clouds.forEach(c => {
        c.x += layer.speed * dt / 16;
        if (c.x > CW + 200) c.x = -250;
      });
    });
    // Window shake (subtle plane vibration)
    this.windowShake = Math.sin(this.elapsed / 100) * 0.5;

    // Memory text progression - play each line ONCE, then complete
    this.lineTimer += dt;
    if (this.lineTimer > this.lineInterval && this.currentLineIdx < this.memoryLines.length - 1) {
      this.lineTimer = 0;
      this.currentLineIdx++;
      showSubtitle(this.memoryLines[this.currentLineIdx], 6000);
    }
    // After the last line has been shown for a while, allow finishing
    if (this.currentLineIdx === this.memoryLines.length - 1 && this.lineTimer > this.lineInterval + 2000 && !this.canFinish) {
      this.canFinish = true;
      showPrompt('Press SPACE or click to continue');
    }

    // Update cloud puffs
    this.cloudPuffs = this.cloudPuffs.filter(p => {
      p.age += dt;
      return p.age < 600;
    });

    // ===== FOG/BREATH MECHANIC =====
    // Charging fog (space held down + mouse over window)
    if (this.isChargingFog) {
      this.fogCharge = Math.min(1, this.fogCharge + dt / 2000);  // 2 seconds to full
    }

    // Update fog circles (fade out over time)
    this.fogCircles = this.fogCircles.filter(fog => {
      fog.age += dt;
      // Fog lasts ~8 seconds, gradually becoming transparent
      fog.alpha = Math.max(0, 1 - fog.age / 8000);
      return fog.alpha > 0.01;
    });

    // Show fog hint after a few seconds
    if (this.elapsed > 6000 && !this.fogHintShown) {
      this.fogHintShown = true;
    }
  }
  onMouseDown(x, y) {
    // Click inside window creates cloud puff
    if (this.isInsideWindow(x, y)) {
      this.cloudPuffs.push({ x, y, age: 0 });
      playSfx('blip');
    }
    if (this.canFinish) {
      this.finish();
    }
    // Start drawing on fog (if clicking on existing fog)
    this.isDrawingOnFog = true;
    this.drawOnFog(x, y);
  }
  onMouseMove(x, y) {
    this.mouseX = x;
    this.mouseY = y;
    // If drawing on fog, continue drawing
    if (this.isDrawingOnFog) {
      this.drawOnFog(x, y);

  }
  onMouseUp(x, y) {

  }
  onKey(e) {
    if (e.key === ' ') {
      if (!this.isChargingFog) {
        if (this.isInsideWindow(this.mouseX, this.mouseY) && !this.canFinish) {
          // Start charging fog on the window
          this.isChargingFog = true;
          this.chargeX = this.mouseX;
          this.chargeY = this.mouseY;
          this.fogCharge = 0;
          hidePrompt();
        } else if (this.canFinish) {
          this.finish();
        }
      }
    }
  }
  // Key up handler - need to add this to scene system
  onKeyUp(e) {
    if ((e.key === ' ') && this.isChargingFog) {
      // Release fog - create fog circle
      this.isChargingFog = false;
      if (this.fogCharge > 0.05) {
        const radius = 30 + this.fogCharge * 100;  // 30 to 130 pixels
        // Create a draw mask canvas for this fog circle
        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = radius * 2;
        maskCanvas.height = radius * 2;
        const maskCtx = maskCanvas.getContext('2d');

        // Use radial gradient for soft edge (like real breath fog)
        // Fog color: light gray-white
        const grad = maskCtx.createRadialGradient(
          radius, radius, 0,           // center
          radius, radius, radius       // edge
        );
        // Center is opaque light gray, edge fades to transparent
        grad.addColorStop(0, 'rgba(230, 230, 235, 1)');
        grad.addColorStop(0.5, 'rgba(225, 225, 230, 0.95)');
        grad.addColorStop(0.8, 'rgba(220, 225, 230, 0.6)');
        grad.addColorStop(0.95, 'rgba(215, 220, 225, 0.2)');
        grad.addColorStop(1, 'rgba(210, 215, 220, 0)');
        maskCtx.fillStyle = grad;
        maskCtx.beginPath();
        maskCtx.arc(radius, radius, radius, 0, Math.PI * 2);
        maskCtx.fill();

        this.fogCircles.push({
          x: this.chargeX,
          y: this.chargeY,
          radius: radius,
          alpha: 1,
          age: 0,
          maskCanvas: maskCanvas,
          maskCtx: maskCtx,
        });
        // Play breath sound
        this.playBreathSound();
      }
      this.fogCharge = 0;
      if (this.canFinish) {
        showPrompt('Press SPACE or click to continue');
      }
    }
  }
  // Draw on fog mask (make areas transparent where player draws)
  drawOnFog(x, y) {
    this.fogCircles.forEach(fog => {
      const localX = x - fog.x + fog.radius;
      const localY = y - fog.y + fog.radius;
      const dist = Math.hypot(x - fog.x, y - fog.y);
      if (dist < fog.radius) {
        // Clear a circle on the mask (make it transparent)
        fog.maskCtx.globalCompositeOperation = 'destination-out';
        fog.maskCtx.beginPath();
        fog.maskCtx.arc(localX, localY, 12, 0, Math.PI * 2);
        fog.maskCtx.fill();
        fog.maskCtx.globalCompositeOperation = 'source-over';
      }
    });
  }
  // Play breath sound (realistic human breath)
  playBreathSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const duration = 1.8;

    // Source: filtered noise (breath air)
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.5;
    }
    noise.buffer = buf;
    noise.loop = true;

    // Chain 1: Low-pass for the breathy "hooo" body
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(300, now);
    lp.frequency.exponentialRampToValueAtTime(1200, now + 0.3);  // opens up
    lp.frequency.exponentialRampToValueAtTime(400, now + duration);  // closes
    lp.Q.value = 0.8;

    // Chain 2: Bandpass for vowel formant (human voice resonance ~500-800Hz)
    const formant = audioCtx.createBiquadFilter();
    formant.type = 'bandpass';
    formant.frequency.value = 700;  // human "ah/oh" formant
    formant.Q.value = 3;

    // Chain 3: High-pass to remove rumble
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 150;

    // Gain envelope: inhale-like attack, sustain, fade
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now + 0.15);    // quick attack
    g.gain.linearRampToValueAtTime(0.22, now + 0.5);     // build
    g.gain.linearRampToValueAtTime(0.15, now + 1.2);     // sustain
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);  // fade out

    // Connect: noise -> hp -> lp -> formant -> g -> destination
    noise.connect(hp);
    hp.connect(lp);
    lp.connect(formant);
    formant.connect(g);
    g.connect(audioCtx.destination);

    noise.start(now);
    noise.stop(now + duration);
  }

    ctx.beginPath();
