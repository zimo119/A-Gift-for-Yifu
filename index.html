    ctx.fill();

    // Seat back (bottom of cabin)
    ctx.fillStyle = '#3a4458';
    ctx.fillRect(0, CH - 70, CW, 70);
    // Headrest (simple, centered)
    ctx.fillStyle = '#2a3448';
    ctx.fillRect(CW / 2 - 70, CH - 80, 140, 40);
    ctx.fillStyle = '#4a5468';
    ctx.fillRect(CW / 2 - 65, CH - 75, 130, 30);

    // Side wall panels (subtle, just darker edges)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 50, 30, CH - 120);
    ctx.fillRect(CW - 30, 50, 30, CH - 120);

    // Cabin wall shading
    const wallGrad = ctx.createRadialGradient(wx, wy, 200, wx, wy, 600);
    wallGrad.addColorStop(0, 'rgba(0,0,0,0)');
    wallGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, CW, CH);

    ctx.restore();  // end outside-window clip

    // ===== STEP 3: Window frame (on top of cabin wall, around the hole) =====
    // Outer oval (dark)
    ctx.strokeStyle = '#2a3848';
    ctx.lineWidth = 16;
    ctx.beginPath();
    ctx.ellipse(wx, wy, 180, 200, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Inner oval (medium gray)
    ctx.strokeStyle = '#3a4858';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.ellipse(wx, wy, 172, 192, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Innermost edge
    ctx.strokeStyle = '#5a6878';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(wx, wy, 168, 188, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Window glass reflection (inside window)
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(wx, wy, 168, 188, 0, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(wx - 50, wy - 60, 80, 100, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();  // end shake translate

    // ===== FOG RENDERING =====
    // Render fog circles on top of the window view
    this.fogCircles.forEach(fog => {
      ctx.save();
      // Clip to the window area
      ctx.beginPath();
      ctx.ellipse(wx, wy, 168, 188, 0, 0, Math.PI * 2);
      ctx.clip();

      // Draw fog using the mask (mask has soft gradient edges)
      ctx.globalAlpha = fog.alpha * 0.9;
      ctx.translate(fog.x - fog.radius, fog.y - fog.radius);
      ctx.drawImage(fog.maskCanvas, 0, 0);
      ctx.restore();
    });

    // ===== FOG CHARGE INDICATOR =====
    // When charging, draw a growing circle (full circle, not arc) around the mouse
    if (this.isChargingFog) {
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(wx, wy, 168, 188, 0, 0, Math.PI * 2);
      ctx.clip();

      const cx = this.chargeX, cy = this.chargeY;
      const minRadius = 25;
      const maxRadius = 130;
      const currentRadius = minRadius + this.fogCharge * (maxRadius - minRadius);

      // Draw soft glowing circle (fill with gradient for soft edge)
      const chargeGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, currentRadius);
      chargeGrad.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
      chargeGrad.addColorStop(0.7, 'rgba(255, 255, 255, 0.1)');
      chargeGrad.addColorStop(0.95, 'rgba(255, 255, 255, 0.4)');
      chargeGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = chargeGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
      ctx.fill();

      // Outline (soft)
      ctx.strokeStyle = `rgba(255, 255, 255, 0.5)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
      ctx.stroke();

      // Center dot
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Fog hint text (larger, at bottom)
    if (this.fogHintShown && !this.isChargingFog) {
      ctx.font = '15px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(240, 208, 144, 0.85)';
      ctx.shadowColor = 'rgba(0,0,0,0.95)';
      ctx.shadowBlur = 5;
      ctx.fillText('Hold SPACE on window to breathe fog • Drag mouse to draw', CW / 2, CH - 50);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'left';
    }

    // Subtle scene title at start
    if (this.elapsed < 4000) {
      const a = this.elapsed < 1000 ? this.elapsed / 1000 : (this.elapsed > 3000 ? (4000 - this.elapsed) / 1000 : 1);
      ctx.globalAlpha = a;
      drawText('Chapter 2: The Crossing', CW / 2, 50, {
        color: '#fff5d0', font: 'bold 22px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      drawText('Above the Pacific', CW / 2, 80, {
        color: '#f0d090', font: '14px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      ctx.globalAlpha = 1;
    }

    // Progress indicator - shows text progression
    const progress = (this.currentLineIdx + 1) / this.memoryLines.length;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(CW - 120, CH - 30, 100, 4);
    ctx.fillStyle = '#f5d850';
    ctx.fillRect(CW - 120, CH - 30, 100 * progress, 4);

    // Hint when interactive
    if (this.elapsed > 5000 && this.elapsed < 8000) {
      const a = this.elapsed < 6000 ? (this.elapsed - 5000) / 1000 : (8000 - this.elapsed) / 2000;
      ctx.globalAlpha = a;
      drawText('Click clouds to watch them drift away', CW / 2, CH - 60, {
        color: '#f0d090', font: '11px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      ctx.globalAlpha = 1;
    }
  }
  drawCloud(x, y, size, puffs) {
    ctx.beginPath();
    for (let i = 0; i < puffs; i++) {
      const px = x + (i - puffs / 2) * size * 0.3;
      const py = y + Math.sin(i * 0.7) * size * 0.1;
      const r = size * (0.4 + (i % 2) * 0.2);
      ctx.arc(px, py, r, 0, Math.PI * 2);
    }
    ctx.fill();
  }
  cleanup() { stopBgm(); hidePrompt(); hideSubtitle(); }
}
SCENES.Chapter2 = Chapter2;

// ===== CHAPTER 3: SNOW =====
// Side-scroller. Father walks right; Mother, Son, Sister follow in formation.
// Snow particles for atmosphere. After ~2000px, Touareg appears from right.
// Father walks to car, family gets in, scene transitions.
class Chapter3 extends Scene {
  init() {
    this.worldX = 0;  // camera offset
    this.player = {
      x: 200, y: 450, speed: 1.5, walkPhase: 0, moving: false,
    };
    // Family followers (relative to player) - using sprite sheets
    this.followers = [
      { name: 'Fanny', dx: -50, dy: 0, x: 150, y: 450, spriteSheet: SPR_FANNY_SHEET, palette: PAL_FANNY_SHEET, walkPhase: 0, moving: false },
      { name: 'Zimo', dx: -90, dy: 5, x: 110, y: 455, spriteSheet: SPR_ZIMO_SHEET, palette: PAL_ZIMO_SHEET, walkPhase: 0, moving: false },
      { name: 'Yukeer', dx: -130, dy: 0, x: 70, y: 450, spriteSheet: SPR_YUKEER_SHEET, palette: PAL_YUKEER_SHEET, walkPhase: 0, moving: false },
    ];
    this.snowflakes = [];
    for (let i = 0; i < 250; i++) {  // more snowflakes for heavier snow
      this.snowflakes.push({
        x: rand(0, CW), y: rand(0, CH),
        vx: rand(0.3, 1.0), vy: rand(0.5, 1.2),
        size: rand(2, 4),  // normal size
      });
    }
    this.distance = 0;
    this.totalDistance = 2500;  // walk distance before car appears
    this.carAppeared = false;
    this.carX = 0;
    this.phase = 'walking';  // walking -> carApproaching -> gettingIn -> driving -> done
    this.gettingInTimer = 0;
    this.gettingInStep = 0;
    this.completed = false;
    this.bgBuildings = this.makeBuildings();
    this.lastStep = 0;

    // Snow footstep audio (loops)
    this.snowFootstepHandle = null;
    this.footstepActive = false;

    // Driving phase
    this.driveDistance = 0;
    this.totalDriveDistance = 2000;
    this.carBobPhase = 0;
    this.wheelRotation = 0;
    this.carStartSoundPlayed = false;
    this.carSpeed = 0;  // current speed (smooth acceleration)
    this.maxCarSpeed = 4;
    this.carAcceleration = 0.08;
    this.carDeceleration = 0.12;
    this.carDrivingHandle = null;  // audio handle for driving sound

    // Squirrel easter egg
    this.squirrels = [];  // {x, y, vx, life, direction}
    this.nextSquirrelTime = rand(8000, 15000);  // first squirrel appears after 8-15s
    this.squirrelTimer = 0;

    // Train easter egg
    this.nextTrainTime = rand(15000, 25000);  // first train sound after 15-25s
    this.trainTimer = 0;
    this.trainPlayed = false;

    // Obstacles (during walking phase)
    this.obstacles = [];  // {type: 'construction'|'oncoming_car', x, y, w, h, vx}
    this.obstacleSpawnTracker = { 0: false, 1: false };  // track which obstacles have spawned

    startBgm('chapter3');
  }
  makeBuildings() {
    const buildings = [];
    let x = -100;
    while (x < 4000) {  // more buildings for driving phase
      buildings.push({
        x: x, w: rand(80, 180), h: rand(120, 220),
        color: choice(['#3a3a4a', '#4a4a5a', '#2a2a3a', '#3a3a4a']),
        windows: Math.floor(rand(2, 5)),
      });
      x += buildings[buildings.length - 1].w + rand(10, 30);
    }
    return buildings;
  }
  update(dt) {
    // ===== WALKING PHASE =====
    if (this.phase === 'walking' || this.phase === 'carApproaching') {
      // Player movement
      let dx = 0, dy = 0;
      if (keys['arrowright'] || keys['d']) dx += 1;
      if (keys['arrowleft'] || keys['a']) dx -= 1;
      if (keys['arrowup'] || keys['w']) dy -= 1;
      if (keys['arrowdown'] || keys['s']) dy += 1;
      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        dx /= len; dy /= len;
        this.player.x += dx * this.player.speed * dt / 16;
        this.player.y += dy * this.player.speed * dt / 16;
        this.player.walkPhase += dt / 100;
        this.player.moving = true;
        // Snow footsteps - start loop if not playing
        if (!this.footstepActive) {
          this.startSnowFootsteps();
          this.footstepActive = true;
        }
      } else {
        this.player.moving = false;
        if (this.footstepActive) {
          this.stopSnowFootsteps();
          this.footstepActive = false;
        }
      }
      // Clamp player y (can use both lanes of the road)
      // Road is at y=420-485, allow full range minus character size
      this.player.y = clamp(this.player.y, 415, 475);

      // Camera follows when player moves past 45% of screen width
      const cameraThreshold = CW * 0.45;
      if (this.player.x > cameraThreshold) {
        const overflow = this.player.x - cameraThreshold;
        this.worldX += overflow;
        this.distance += overflow;
        this.player.x = cameraThreshold;
      }
      this.player.x = clamp(this.player.x, 80, CW - 80);
      if (this.worldX < 0) {
        this.player.x -= this.worldX;
        this.worldX = 0;
      }

      // Update followers - they always animate when player is moving
      this.followers.forEach((f, i) => {
        const targetX = this.player.x + f.dx;
        const targetY = this.player.y + f.dy;
        const ddx = targetX - f.x, ddy = targetY - f.y;
        const d = Math.hypot(ddx, ddy);
        if (d > 1) {
          f.x += ddx * 0.05 * dt / 16;
          f.y += ddy * 0.05 * dt / 16;
        }
        // Followers walk when the player walks (even if they're at their target position)
        f.moving = this.player.moving;
        if (f.moving) {
          f.walkPhase += dt / 120;
        }
      });

      // ===== EASTER EGGS (only during walking) =====
      this.updateSquirrels(dt);
      this.updateTrainSound(dt);

      // ===== OBSTACLES (only during walking phase) =====
      this.updateObstacles(dt);
      // Check collisions
      this.checkObstacleCollisions();
    }

    // Update snowflakes (always)
    this.snowflakes.forEach(s => {
      s.x += s.vx * dt / 16;
      s.y += s.vy * dt / 16;
      if (s.y > CH) { s.y = -5; s.x = rand(0, CW); }
      if (s.x > CW) { s.x = -5; }
    });

    // ===== CAR APPEARS =====
    if (this.distance >= this.totalDistance && !this.carAppeared) {
      this.carAppeared = true;
      this.phase = 'carApproaching';
      this.carX = CW + 100;
      showSubtitle('A familiar car...', 3000);
    }

    // Car drives in
    if (this.phase === 'carApproaching') {
      this.carX -= 1.5 * dt / 16;
      if (this.carX < 600) {
        this.carX = 600;
        this.phase = 'gettingIn';
        this.gettingInTimer = 0;
        this.gettingInStep = 0;
        // Clear all obstacles when entering car phase
        this.obstacles = [];
        // Stop walking footsteps
        if (this.footstepActive) {
          this.stopSnowFootsteps();
          this.footstepActive = false;
        }
      }
    }

    // ===== GETTING IN ANIMATION =====
    if (this.phase === 'gettingIn') {
      this.gettingInTimer += dt;
      const stepDuration = 1000;
      if (this.gettingInTimer > stepDuration) {
        this.gettingInTimer = 0;
        this.gettingInStep++;
        playSfx('confirm');
        if (this.gettingInStep > 5) {
          // All in - start driving phase
          this.phase = 'driving';
          this.driveDistance = 0;
          showSubtitle('Press → to drive home', 4000);
        }
      }
      const carDoorX = this.carX - 20;
      if (this.gettingInStep === 0) {
        this.player.x = lerp(this.player.x, carDoorX, 0.06);
        this.player.walkPhase += dt / 80;
        this.player.moving = true;
      } else if (this.gettingInStep === 2) {
        this.followers[0].x = lerp(this.followers[0].x, carDoorX, 0.06);
        this.followers[0].walkPhase += dt / 80;
        this.followers[0].moving = true;
      } else if (this.gettingInStep === 3) {
        this.followers[1].x = lerp(this.followers[1].x, carDoorX, 0.06);
        this.followers[1].walkPhase += dt / 80;
        this.followers[1].moving = true;
      } else if (this.gettingInStep === 4) {
        this.followers[2].x = lerp(this.followers[2].x, carDoorX, 0.06);
        this.followers[2].walkPhase += dt / 80;
        this.followers[2].moving = true;
      }
    }

    // ===== DRIVING PHASE =====
    if (this.phase === 'driving') {
      // Play car start sound once
      if (!this.carStartSoundPlayed) {
        playAudioBuffer('car_start', { volume: 0.6 });
        this.carStartSoundPlayed = true;
      }

      // Smooth acceleration/deceleration
      const isPressingForward = keys['arrowright'] || keys['d'];
      if (isPressingForward) {
        // Accelerate
        this.carSpeed = Math.min(this.maxCarSpeed, this.carSpeed + this.carAcceleration * dt / 16);
        // Start car driving sound if not playing
        if (!this.carDrivingHandle && this.carSpeed > 0.5) {
          this.carDrivingHandle = playAudioBuffer('car_driving', { loop: true, volume: 0.5 });
        }
      } else {
        // Decelerate
        this.carSpeed = Math.max(0, this.carSpeed - this.carDeceleration * dt / 16);
        // Stop car driving sound when speed is very low
        if (this.carSpeed < 0.3 && this.carDrivingHandle) {
          stopAudioSource(this.carDrivingHandle);
          this.carDrivingHandle = null;
        }
      }

      // Move car by current speed
      if (this.carSpeed > 0) {
        this.worldX += this.carSpeed * dt / 16;
        this.driveDistance += this.carSpeed * dt / 16;
        // Car bobbing (bumpy road) - intensity based on speed
        this.carBobPhase += dt / 80 * (this.carSpeed / this.maxCarSpeed);
        // Wheel rotation - speed based
        this.wheelRotation += dt / 30 * (this.carSpeed / this.maxCarSpeed);
      }

      // Check if reached destination
      if (this.driveDistance >= this.totalDriveDistance && !this.completed) {
        this.completed = true;
        // Stop driving sound
        if (this.carDrivingHandle) {
          stopAudioSource(this.carDrivingHandle);
          this.carDrivingHandle = null;
        }
        if (game.unlockedChapters < 4) {
          game.unlockedChapters = 4;
          saveGame();
        }
        changeScene('ClearAnimation', { chapterId: 3, nextSceneName: 'Chapter4' });
      }
    }
  }

  // ===== SNOW FOOTSTEPS AUDIO (loops the recorded audio) =====
  startSnowFootsteps() {
    if (this.snowFootstepHandle) return;
    this.snowFootstepHandle = playAudioBuffer('snow_footsteps', { loop: true, volume: 0.35 });
  }
  stopSnowFootsteps() {
    if (this.snowFootstepHandle) {
      stopAudioSource(this.snowFootstepHandle);
      this.snowFootstepHandle = null;
    }
  }

  // ===== SQUIRREL EASTER EGG =====
  updateSquirrels(dt) {
    this.squirrelTimer += dt;
    if (this.squirrelTimer > this.nextSquirrelTime) {
      // Spawn a squirrel
      this.squirrelTimer = 0;
      this.nextSquirrelTime = rand(10000, 20000);
      const fromLeft = Math.random() < 0.5;
      this.squirrels.push({
        x: fromLeft ? -30 : CW + 30,
        y: rand(420, 470),
        vx: fromLeft ? rand(2, 3.5) : -rand(2, 3.5),
        life: 5000,
      });
    }
    // Update squirrels
    this.squirrels = this.squirrels.filter(sq => {
      sq.x += sq.vx * dt / 16;
      sq.life -= dt;
      return sq.life > 0 && sq.x > -50 && sq.x < CW + 50;
    });
  }

  // ===== TRAIN SOUND EASTER EGG =====
  updateTrainSound(dt) {
    this.trainTimer += dt;
    if (this.trainTimer > this.nextTrainTime && !this.trainPlayed) {
      this.trainPlayed = true;
      playAudioBuffer('train', { volume: 0.4 });
      setTimeout(() => {
        this.trainPlayed = false;
        this.trainTimer = 0;
        this.nextTrainTime = rand(20000, 35000);
      }, 8000);
    }
  }

  // ===== OBSTACLES =====
  updateObstacles(dt) {
    // Only 2 obstacles total: 1 construction + 1 oncoming car
    // Far apart (1500px gap, wider than screen) so they never appear simultaneously
    // Only spawn during walking phase
    if (this.phase !== 'walking') return;

    // Initialize spawn tracking on first call
    if (!this.obstacleSpawnTracker) {
      this.obstacleSpawnTracker = { 0: false, 1: false };
    }

    const obstaclePositions = [
      { worldX: 800, type: 'construction', lane: 'upper' },
      { worldX: 2300, type: 'oncoming_car', lane: 'upper' },
    ];

    // Spawn obstacle when camera is close enough (within 1000px before it)
    obstaclePositions.forEach((pos, idx) => {
      if (!this.obstacleSpawnTracker[idx] && this.worldX > pos.worldX - 1000) {
        this.obstacleSpawnTracker[idx] = true;  // mark as spawned
        const useUpperLane = pos.lane === 'upper';
        if (pos.type === 'construction') {
          this.obstacles.push({
            type: 'construction',
            x: 0,
            y: useUpperLane ? 420 : 450,
            w: 80,
            h: 28,
            vx: 0,
            worldX: pos.worldX,
          });
        } else {
          this.obstacles.push({
            type: 'oncoming_car',
            x: 0,
            y: useUpperLane ? 425 : 455,
            w: 60,
            h: 30,
            vx: -3.5,
            worldX: pos.worldX,
          });
        }
      }
    });

    // Update obstacle positions
    this.obstacles = this.obstacles.filter(obs => {
      if (obs.type === 'construction') {
        obs.x = obs.worldX - this.worldX;
      } else {
        obs.worldX += obs.vx * dt / 16;
        obs.x = obs.worldX - this.worldX;
      }
      // Remove if off-screen left
      return obs.x > -150;
    });
  }

  // Check if any character (player or follower) collides with an obstacle
  checkObstacleCollisions() {
    if (this.phase !== 'walking' && this.phase !== 'carApproaching') return;

    // Character collision box - only the lower body (feet/legs area)
    // This is fair because the top-down view means the "head" visually overlaps
    // obstacles but the character isn't actually standing in them.
    // Sprite is 8x8 scaled by 5 = 40x40. Character center is at y.
    // Lower body = bottom half: from y+5 to y+20, width 20
    const charW = 20;
    const charH = 15;  // shorter height (just legs)
    const charYOffset = 5;  // offset down from center (lower body)

    // Collect all character positions
    const characters = [
      { x: this.player.x, y: this.player.y, name: 'Father' },
      ...this.followers.map(f => ({ x: f.x, y: f.y, name: f.name })),
    ];

    for (const obs of this.obstacles) {
      for (const char of characters) {
        // AABB collision - lower body only
        const charLeft = char.x - charW / 2;
        const charRight = char.x + charW / 2;
        const charTop = char.y + charYOffset;
        const charBottom = char.y + charYOffset + charH;

        const obsLeft = obs.x;
        const obsRight = obs.x + obs.w;
        const obsTop = obs.y;
        const obsBottom = obs.y + obs.h;

        if (charRight > obsLeft && charLeft < obsRight &&
            charBottom > obsTop && charTop < obsBottom) {
          // Collision! Restart chapter
          showSubtitle(`${char.name} hit an obstacle! Restarting...`, 2000);
          if (this.footstepActive) {
            this.stopSnowFootsteps();
            this.footstepActive = false;
          }
          setTimeout(() => {
            changeScene('Chapter3');
          }, 1500);
          return;
        }
      }
    }
  }

  onKey(e) {}
  onMouseDown(x, y) {}

  render() {
    // Sky - cold winter
    const g = ctx.createLinearGradient(0, 0, 0, CH);
    g.addColorStop(0, '#3a4a6a');
    g.addColorStop(0.5, '#5a6a8a');
    g.addColorStop(1, '#7a8aaa');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, CW, CH);

    // Distant buildings (parallax) - sit on ground (y=480)
    this.bgBuildings.forEach(b => {
      const screenX = b.x - this.worldX * 0.3;
      if (screenX > -200 && screenX < CW + 100) {
        const buildingTop = 480 - b.h;  // building bottom at ground level (480)
        ctx.fillStyle = b.color;
        ctx.fillRect(screenX, buildingTop, b.w, b.h);
        // Windows (some lit, some not)
        for (let i = 0; i < b.windows; i++) {
          for (let j = 0; j < Math.floor(b.h / 25); j++) {
            const wx = screenX + 8 + i * 20;
            const wy = buildingTop + 10 + j * 25;
            if (wx > 0 && wx < CW && wy < 475) {
              ctx.fillStyle = (i + j + Math.floor(b.x)) % 3 === 0 ? '#f0d890' : '#1a1a2a';
              ctx.fillRect(wx, wy, 12, 16);
            }
          }
        }
      }
    });

    // Closer buildings - sit on ground
    this.bgBuildings.forEach((b, idx) => {
      const screenX = b.x * 1.5 - this.worldX * 0.6;
      if (screenX > -200 && screenX < CW + 100 && idx % 2 === 0) {
        ctx.fillStyle = '#3a3a4a';
        const h = b.h * 0.7;
        const buildingTop = 480 - h;  // sit on ground
        ctx.fillRect(screenX, buildingTop, b.w * 0.8, h);
        // Windows
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < Math.floor(h / 20); j++) {
            const wx = screenX + 10 + i * 18;
            const wy = buildingTop + 15 + j * 20;
            if (wx > 0 && wx < CW && wy < 475) {
              ctx.fillStyle = (i + j + idx) % 2 === 0 ? '#f0d890' : '#1a1a2a';
              ctx.fillRect(wx, wy, 10, 14);
            }
          }
        }
      }
    });

    // Snow ground (below road)
    ctx.fillStyle = '#d8e0e8';
    ctx.fillRect(0, 480, CW, CH - 480);
    ctx.fillStyle = '#a8b8c8';
    for (let x = 0; x < CW; x += 60) {
      const drift = (Math.sin((x + this.worldX) * 0.05) + 1) * 3;  // smaller drifts
      ctx.fillRect(x, 480 - drift, 60, drift + 2);
    }

    // Road/sidewalk - wider, properly positioned on ground
    // Road surface (dark asphalt)
    ctx.fillStyle = '#4a4a5a';
    ctx.fillRect(0, 420, CW, 65);
    // Road edge highlights
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(0, 420, CW, 3);
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(0, 482, CW, 3);
    // Sidewalk curb (top edge, lighter)
    ctx.fillStyle = '#7a7a8a';
    ctx.fillRect(0, 418, CW, 4);
    // Road dashed center line (on the road surface, not floating)
    ctx.fillStyle = '#d0d0a0';
    for (let x = -this.worldX % 80; x < CW; x += 80) {
      ctx.fillRect(x, 450, 30, 3);
    }
    // Road cracks/details
    ctx.strokeStyle = '#3a3a4a';
    ctx.lineWidth = 1;
    for (let x = -this.worldX % 120; x < CW; x += 120) {
      ctx.beginPath();
      ctx.moveTo(x, 425);
      ctx.lineTo(x + 5, 480);
      ctx.stroke();
    }

    // Lamp posts (base on the road)
    for (let lx = 0; lx < 5000; lx += 350) {
      const screenX = lx - this.worldX;
      if (screenX > -50 && screenX < CW + 50) {
        // Light glow (drawn first, behind pole, using arc not rect for clean circle)
        const lg = ctx.createRadialGradient(screenX + 2, 235, 0, screenX + 2, 235, 90);
        lg.addColorStop(0, 'rgba(255,220,140,0.5)');
        lg.addColorStop(0.5, 'rgba(255,220,140,0.2)');
        lg.addColorStop(1, 'rgba(255,220,140,0)');
        ctx.fillStyle = lg;
        ctx.beginPath();
        ctx.arc(screenX + 2, 235, 90, 0, Math.PI * 2);
        ctx.fill();
        // Pole
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(screenX, 230, 4, 200);
        // Lamp head
        ctx.fillStyle = '#3a3a2a';
        ctx.fillRect(screenX - 4, 224, 12, 10);
        // Lamp bulb (bright center)
        ctx.fillStyle = '#fff5d0';
        ctx.fillRect(screenX - 1, 228, 6, 4);
      }
    }

    // Squirrels (easter egg)
    this.squirrels.forEach(sq => this.drawSquirrel(sq));

    // Obstacles (construction zones and oncoming cars)
    this.obstacles.forEach(obs => this.drawObstacle(obs));

    // Car (if appeared)
    if (this.carAppeared) {
      this.drawCar();
    }

    // Family (followers) - only during walking/gettingIn
    if (this.phase !== 'driving') {
      this.followers.forEach((f, i) => {
        let visible = true;
        if (this.phase === 'gettingIn') {
          if (this.gettingInStep === 2 && i === 0 && this.gettingInTimer > 600) visible = false;
          if (this.gettingInStep === 3 && i === 1 && this.gettingInTimer > 600) visible = false;
          if (this.gettingInStep === 4 && i === 2 && this.gettingInTimer > 600) visible = false;
          if (this.gettingInStep > 2 && i === 0) visible = false;
          if (this.gettingInStep > 3 && i === 1) visible = false;
          if (this.gettingInStep > 4 && i === 2) visible = false;
        }
        if (visible) {
          const sc = 5;  // 8x8 * 5 = 40px
          const sz = { w: 8, h: 8 };
          const x = f.x - sz.w * sc / 2;
          const y = f.y - sz.h * sc / 2;
          drawSheetCharacter(ctx, f.spriteSheet, f.palette, x, y, sc,
            f.walkPhase, f.moving);
        }
      });

      // Player (father)
      let playerVisible = true;
      if (this.phase === 'gettingIn' && (this.gettingInStep >= 1)) playerVisible = false;
      if (playerVisible) {
        const sc = 5;
        const sz = { w: 8, h: 8 };
        const x = this.player.x - sz.w * sc / 2;
        const y = this.player.y - sz.h * sc / 2;
        drawSheetCharacter(ctx, SPR_YIFU_SHEET, PAL_YIFU_SHEET, x, y, sc,
          this.player.walkPhase, this.player.moving);
      }
    }

    // Snow particles (foreground)
    this.snowflakes.forEach(s => {
      ctx.fillStyle = `rgba(255,255,255,${0.6 + s.size * 0.1})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    });

    // Cold overlay
    ctx.fillStyle = 'rgba(100,130,180,0.08)';
    ctx.fillRect(0, 0, CW, CH);

    // Chapter title at start
    if (this.worldX < 50 && this.phase === 'walking') {
      const a = this.worldX < 30 ? 1 : (50 - this.worldX) / 20;
      ctx.globalAlpha = a;
      drawText('Chapter 3: Snow', CW / 2, 50, {
        color: '#f0e0d0', font: 'bold 22px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      drawText('Toronto Winter', CW / 2, 80, {
        color: '#a0b0c0', font: '14px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      ctx.globalAlpha = 1;
    }

    // Distance progress (before car appears)
    if (!this.carAppeared) {
      const progress = Math.min(1, this.distance / this.totalDistance);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(CW - 130, CH - 30, 110, 4);
      ctx.fillStyle = '#a0b8d0';
      ctx.fillRect(CW - 130, CH - 30, 110 * progress, 4);
      drawText('Walking...', CW - 75, CH - 40, {
        color: '#a0b8d0', font: '14px "Courier New", monospace', align: 'center', shadow: true,
      });
    }

    // Getting in message
    if (this.phase === 'gettingIn') {
      const msgs = [
        'Father gets in...',
        '...',
        'Fanny gets in...',
        'Zimo gets in...',
        'Yukeer gets in...',
        'Door closes...'
      ];
      drawText(msgs[Math.min(this.gettingInStep, 5)], CW / 2, 80, {
        color: '#f0e0d0', font: '18px "Courier New", monospace',
        align: 'center', shadow: true,
      });
    }

    // Driving phase UI
    if (this.phase === 'driving') {
      const progress = Math.min(1, this.driveDistance / this.totalDriveDistance);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(CW - 130, CH - 30, 110, 4);
      ctx.fillStyle = '#c9a86a';

      drawText('Driving home...', CW - 75, CH - 40, {
        color: '#c9a86a', font: '14px "Courier New", monospace', align: 'center', shadow: true,
      });
      // Prompt
      if (this.driveDistance < 200) {
        drawText('Press → to drive', CW / 2, 80, {
          color: '#f0e0d0', font: '20px "Courier New", monospace',
          align: 'center', shadow: true,
        });
      }
    }
  }

  // ===== DRAW CAR (with bobbing and wheel rotation during driving) =====
  drawCar() {
    const carScale = 2.2;
    const carSpriteW = SPR_TOUAREG[0].length;
    const carSpriteH = SPR_TOUAREG.length;

    // Bobbing offset during driving (intensity based on speed)
    let bobY = 0;
    if (this.phase === 'driving' && this.carSpeed > 0) {
      const intensity = this.carSpeed / this.maxCarSpeed;
      bobY = (Math.sin(this.carBobPhase) * 1.5 + Math.sin(this.carBobPhase * 2.3) * 0.5) * intensity;
    }

    const carDrawX = this.carX - carSpriteW * carScale / 2;
    const carDrawY = 450 - carSpriteH * carScale / 2 + bobY;

    // Car shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(this.carX, 450 + carSpriteH * carScale / 2 - 10, carSpriteW * carScale * 0.4, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw car body (sprite)
    drawSprite(ctx, SPR_TOUAREG, PAL_TOUAREG, carDrawX, carDrawY, carScale);

    // Draw rotating wheels on top
    // Wheel positions: based on sprite (48x28), wheels at rows 24-27, cols 6-9 (back) and 38-41 (front)
    const wheelY = carDrawY + 25 * carScale;
    const wheelR = 4 * carScale;
    const backWheelX = carDrawX + 8 * carScale;
    const frontWheelX = carDrawX + 40 * carScale;

    this.drawWheel(backWheelX, wheelY, wheelR, this.wheelRotation);
    this.drawWheel(frontWheelX, wheelY, wheelR, this.wheelRotation);

    // Door open indicator during gettingIn
    if (this.phase === 'gettingIn') {
      ctx.fillStyle = '#5a6068';
      ctx.fillRect(this.carX - 35, 370, 30, 50);
    }
  }

  drawWheel(cx, cy, r, rotation) {
    // Tire (black circle)
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // Hubcap (silver)
    ctx.fillStyle = '#9aa0a8';
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Rotation mark (a line that rotates with the wheel)
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(rotation) * r * 0.5, cy + Math.sin(rotation) * r * 0.5);
    ctx.stroke();
    // Center dot
    ctx.fillStyle = '#5a5a5a';
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ===== DRAW SQUIRREL (easter egg) =====
  drawSquirrel(sq) {
    const sc = 1.5;
    const px = sq.x, py = sq.y;
    const flip = sq.vx < 0;

    // Body (brown/reddish)
    ctx.fillStyle = '#8a5a3a';
    ctx.fillRect(px - 4 * sc, py - 3 * sc, 8 * sc, 5 * sc);
    // Head
    ctx.fillRect(px + (flip ? -6 : 2) * sc, py - 5 * sc, 4 * sc, 4 * sc);
    // Ear
    ctx.fillRect(px + (flip ? -6 : 5) * sc, py - 6 * sc, 2 * sc, 2 * sc);
    // Eye
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(px + (flip ? -5 : 4) * sc, py - 4 * sc, 1 * sc, 1 * sc);
    // Tail (bushy, curled up)
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(px + (flip ? 4 : -6) * sc, py - 6 * sc, 3 * sc, 2 * sc);
    ctx.fillRect(px + (flip ? 5 : -7) * sc, py - 8 * sc, 2 * sc, 2 * sc);
    // Legs
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(px - 3 * sc, py + 2 * sc, 2 * sc, 2 * sc);
    ctx.fillRect(px + 1 * sc, py + 2 * sc, 2 * sc, 2 * sc);
    // Belly (lighter)
    ctx.fillStyle = '#c9a86a';
    ctx.fillRect(px - 2 * sc, py - 1 * sc, 4 * sc, 3 * sc);
  }

  // ===== DRAW OBSTACLE =====
  drawObstacle(obs) {
    if (obs.type === 'construction') {
      this.drawConstructionZone(obs);
    } else if (obs.type === 'oncoming_car') {
      this.drawOncomingCar(obs);
    }
  }

  // Construction fenced area
  drawConstructionZone(obs) {
    const x = obs.x, y = obs.y, w = obs.w, h = obs.h;

    // Base (snow-covered construction area)
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(x, y, w, h);
    // Snow on top
    ctx.fillStyle = '#d8e0e8';
    ctx.fillRect(x, y, w, 4);

    // Orange construction fence (striped)
    for (let i = 0; i < w; i += 12) {
      ctx.fillStyle = '#ff8030';
      ctx.fillRect(x + i, y + 6, 6, h - 6);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + i + 6, y + 6, 6, h - 6);
    }

    // Construction cones at corners
    ctx.fillStyle = '#ff6020';
    // Left cone
    ctx.beginPath();
    ctx.moveTo(x - 4, y + h);
    ctx.lineTo(x, y + 4);
    ctx.lineTo(x + 4, y + h);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 2, y + 12, 4, 2);
    // Right cone
    ctx.fillStyle = '#ff6020';
    ctx.beginPath();
    ctx.moveTo(x + w - 4, y + h);
    ctx.lineTo(x + w, y + 4);
    ctx.lineTo(x + w + 4, y + h);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x + w - 2, y + 12, 4, 2);

    // Warning sign
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 8);
    ctx.lineTo(x + w / 2 + 8, y);
    ctx.lineTo(x + w / 2, y + 8);
    ctx.lineTo(x + w / 2 - 8, y);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + w / 2 - 1, y - 4, 2, 6);
  }

  // Oncoming car (different color from family's Touareg)
  drawOncomingCar(obs) {
    const x = obs.x, y = obs.y;
    const sc = 1.8;
    // Draw a simple car facing LEFT (oncoming)
    // Body (dark red - different from silver Touareg)
    ctx.fillStyle = '#8a3030';
    // Car body
    ctx.fillRect(x + 5, y + 5, 50 * sc / 2, 15);
    ctx.fillRect(x + 10, y, 40 * sc / 2, 8);
    // Roof
    ctx.fillStyle = '#6a2020';
    ctx.fillRect(x + 12, y - 2, 36 * sc / 2, 6);
    // Window
    ctx.fillStyle = '#a8c8e8';
    ctx.fillRect(x + 14, y + 1, 32 * sc / 2, 4);
    // Wheels
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(x + 12, y + 20, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 48, y + 20, 5, 0, Math.PI * 2);
    ctx.fill();
    // Headlights (facing left - oncoming)
    ctx.fillStyle = '#fff8a0';
    ctx.fillRect(x + 2, y + 8, 4, 4);
    // Headlight glow
    ctx.fillStyle = 'rgba(255,248,160,0.3)';
    ctx.beginPath();
    ctx.arc(x, y + 10, 15, 0, Math.PI * 2);
    ctx.fill();
  }

  cleanup() {
    stopBgm();
    hideSubtitle();
    hidePrompt();
    this.stopSnowFootsteps();
    if (this.carDrivingHandle) stopAudioSource(this.carDrivingHandle);
  }
}

// ===== CHAPTER 4: WEAVING =====
// Pixel-art map of Toronto (Etobicoke area). Player draws lines between 8 location nodes.
// All 8 nodes must be connected to the Home node (directly or via other nodes) to clear.
class Chapter4 extends Scene {
  init() {
    // 8 location nodes - positioned based on real Etobicoke geography
    // Approximate relative positions on the canvas
    this.nodes = [
      { id: 'home', name: '36 Zorra St', subtitle: 'Our new home',
        x: 380, y: 320, icon: 'house', connected: false },
      { id: 'norseman', name: 'Norseman JMS', subtitle: 'I started going to school',
        x: 280, y: 380, icon: 'school', connected: false },
      { id: 'etobicoke', name: 'Etobicoke CI', subtitle: 'My high school',
        x: 200, y: 440, icon: 'school', connected: false },
      { id: 'johnenglish', name: 'John English MS', subtitle: 'Sister started going to school',
        x: 480, y: 400, icon: 'school', connected: false },
      { id: 'airport', name: 'Pearson Airport', subtitle: 'Where we first landed',
        x: 130, y: 130, icon: 'airplane', connected: false },
      { id: 'cntower', name: 'CN Tower', subtitle: "Toronto's landmark",
        x: 720, y: 250, icon: 'tower', connected: false },
      { id: 'niagara', name: 'Niagara Falls', subtitle: 'Our first family trip',
        x: 800, y: 480, icon: 'waterfall', connected: false },
      { id: 'centennial', name: 'Centennial Park', subtitle: 'Where we walk on weekends',
        x: 200, y: 230, icon: 'park', connected: false },
    ];
    this.connections = [];  // array of {a: nodeId, b: nodeId}
    this.draggingFrom = null;  // node being dragged from
    this.mouseX = 0; this.mouseY = 0;
    this.cleared = false;
    this.completed = false;
    this.nodeHover = null;
    this.startTime = performance.now();
    startBgm('chapter4');
  }
  update(dt) {
    // Check hover state
    this.nodeHover = null;
    for (const n of this.nodes) {
      if (dist(this.mouseX, this.mouseY, n.x, n.y) < 25) {
        this.nodeHover = n.id;
        break;
      }
    }
    // Update connection states (BFS from home)
    this.updateConnectivity();
    // Check win condition
    if (!this.cleared && this.allConnected()) {
      this.cleared = true;
      // Wait a moment then trigger clear
      setTimeout(() => {
        if (!this.completed) {
          this.completed = true;
          if (game.unlockedChapters < 5) {
            game.unlockedChapters = 5;
            saveGame();
          }
          changeScene('ClearAnimation', { chapterId: 4, nextSceneName: 'Ending' });
        }
      }, 1500);
      showSubtitle('All memories woven together...', 1500);
    }
  }
  updateConnectivity() {
    // BFS from 'home' to find connected nodes
    const adj = {};
    this.nodes.forEach(n => adj[n.id] = []);
    this.connections.forEach(c => {
      adj[c.a].push(c.b);
      adj[c.b].push(c.a);
    });
    const visited = new Set(['home']);
    const queue = ['home'];
    while (queue.length) {
      const cur = queue.shift();
      adj[cur].forEach(next => {
        if (!visited.has(next)) {
          visited.add(next);
          queue.push(next);
        }
      });
    }
    this.nodes.forEach(n => n.connected = visited.has(n.id));
  }
  allConnected() {
    return this.nodes.every(n => n.connected);
  }
  onMouseMove(x, y) {
    this.mouseX = x; this.mouseY = y;
  }
  onMouseDown(x, y) {
    // Start dragging from a node
    for (const n of this.nodes) {
      if (dist(x, y, n.x, n.y) < 25) {
        this.draggingFrom = n.id;
        playSfx('click');
        return;
      }
    }
  }
  onMouseUp(x, y) {
    if (!this.draggingFrom) return;
    // Drop on another node
    for (const n of this.nodes) {
      if (n.id !== this.draggingFrom && dist(x, y, n.x, n.y) < 25) {
        // Add connection (if not already exists)
        const exists = this.connections.some(c =>
          (c.a === this.draggingFrom && c.b === n.id) ||
          (c.a === n.id && c.b === this.draggingFrom));
        if (!exists) {
          this.connections.push({ a: this.draggingFrom, b: n.id });
          playSfx('confirm');
        } else {
          playSfx('blip');
        }
        break;
      }
    }
    this.draggingFrom = null;
  }
  render() {
    // Pixel-art Toronto map background
    this.drawMap();

    // Draw existing connections
    this.connections.forEach(c => {
      const a = this.nodes.find(n => n.id === c.a);
      const b = this.nodes.find(n => n.id === c.b);
      // Connection line - golden
      ctx.strokeStyle = '#c9a86a';
      ctx.lineWidth = 3;
      ctx.setLineDash([5, 3]);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.setLineDash([]);
      // Animated dot along the line
      const t = (performance.now() / 1000) % 1;
      const dx = lerp(a.x, b.x, t), dy = lerp(a.y, b.y, t);
      ctx.fillStyle = '#f0d090';
      ctx.beginPath();
      ctx.arc(dx, dy, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw dragging line (in progress)
    if (this.draggingFrom) {
      const a = this.nodes.find(n => n.id === this.draggingFrom);
      ctx.strokeStyle = 'rgba(240,208,144,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(this.mouseX, this.mouseY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw nodes
    this.nodes.forEach(n => this.drawNode(n));

    // Title
    drawText('Chapter 4: Weaving', CW / 2, 30, {
      color: '#f0d090', font: 'bold 18px "Courier New", monospace',
      align: 'center', shadow: true,
    });
    drawText('Click and drag between locations to connect them', CW / 2, 52, {
      color: '#f0d090', font: '15px "Courier New", monospace',
      align: 'center', shadow: true,
    });

    // Progress
    const connected = this.nodes.filter(n => n.connected).length;
    drawText(`Connected: ${connected} / ${this.nodes.length}`, 20, 20, {
      color: '#f0d090', font: '12px "Courier New", monospace',
    });

    // Node info popup on hover
    if (this.nodeHover) {
      const n = this.nodes.find(x => x.id === this.nodeHover);
      if (n) {
        const tx = n.x + 30, ty = n.y - 30;
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(tx - 5, ty - 18, 200, 40);
        ctx.strokeStyle = '#c9a86a';
        ctx.lineWidth = 1;
        ctx.strokeRect(tx - 5, ty - 18, 200, 40);
        drawText(n.name, tx, ty - 12, {
          color: '#f0d090', font: 'bold 12px "Courier New", monospace',
        });
        drawText(n.subtitle, tx, ty + 4, {
          color: '#a08868', font: '10px "Courier New", monospace',
        });
      }
    }
  }
  drawMap() {
    // Background - Toronto area in soft pixel tones
    // Land (green-ish)
    const g = ctx.createLinearGradient(0, 0, 0, CH);
    g.addColorStop(0, '#8a9a7a');
    g.addColorStop(1, '#6a7a5a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, CW, CH);

    // Lake Ontario (bottom)
    ctx.fillStyle = '#5a7a9a';
    ctx.fillRect(0, CH - 80, CW, 80);
    // Water shimmer
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.1})`;
      ctx.fillRect(rand(0, CW), CH - 80 + rand(0, 80), 8, 1);
    }

    // Major roads (grid pattern, like Toronto)
    ctx.strokeStyle = '#c0b090';
    ctx.lineWidth = 2;
    // Horizontal roads
    [100, 200, 300, 400].forEach(y => {
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(CW, y);
      ctx.stroke();
    });
    // Vertical roads
    [100, 250, 400, 550, 700, 850].forEach(x => {
      ctx.beginPath();
      ctx.moveTo(x, 0); ctx.lineTo(x, CH - 80);
      ctx.stroke();
    });
    // Highway 427 / QEW (thicker road)
    ctx.strokeStyle = '#8a7a5a';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(150, 0); ctx.lineTo(150, CH - 80);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 480); ctx.lineTo(CW, 480);
    ctx.stroke();

    // Parks (green blocks)
    ctx.fillStyle = '#7a9a6a';
    ctx.fillRect(160, 200, 80, 60);  // Centennial Park area
    ctx.fillRect(550, 100, 100, 50);  // Another park
    // Trees on parks
    ctx.fillStyle = '#5a7a4a';
    for (let i = 0; i < 20; i++) {
      const px = 160 + (i * 13) % 80;
      const py = 200 + (i * 7) % 60;
      ctx.fillRect(px, py, 4, 4);
      ctx.fillRect(px + 1, py - 2, 2, 2);
    }

    // Buildings (pixel blocks)
    sresetSeed(42);
    for (let i = 0; i < 50; i++) {
      const bx = srand() * CW;
      const by = srand() * (CH - 100);
      const bw = 8 + srand() * 20;
      const bh = 8 + srand() * 20;
      // Don't draw on roads/parks (simplified - just draw)
      ctx.fillStyle = ['#8a8a8a', '#9a8a7a', '#7a8a8a'][Math.floor(srand() * 3)];
      ctx.fillRect(bx, by, bw, bh);
      // Roof
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(bx, by, bw, 2);
    }

    // Subtle vignette
    const vg = ctx.createRadialGradient(CW/2, CH/2, 200, CW/2, CH/2, 500);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, CW, CH);
  }
  drawNode(n) {
    const connected = n.connected;
    const isHome = n.id === 'home';
    const isHover = this.nodeHover === n.id;
    const isDragging = this.draggingFrom === n.id;

    // Glow ring
    if (isHome || isHover) {
      const pulse = Math.sin(performance.now() / 400) * 0.3 + 0.7;
      ctx.fillStyle = isHome ? `rgba(240,208,144,${pulse * 0.3})` : `rgba(200,168,106,${pulse * 0.2})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, 30, 0, Math.PI * 2);
      ctx.fill();
    }
    // Node background
    ctx.fillStyle = connected ? '#f0d090' : '#3a3a3a';
    ctx.beginPath();
    ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
    ctx.fill();
    // Border
    ctx.strokeStyle = isHome ? '#c9a86a' : (connected ? '#c9a86a' : '#5a5a5a');
    ctx.lineWidth = isHome ? 3 : 2;
    ctx.stroke();
    // Icon
    this.drawNodeIcon(n);
    // Label
    drawText(n.name, n.x, n.y + 26, {
      color: '#fff', font: '10px "Courier New", monospace',
      align: 'center', shadow: true,
    });
  }
  drawNodeIcon(n) {
    const c = n.connected ? '#3a2a0a' : '#aaa';
    ctx.fillStyle = c;
    const x = n.x, y = n.y;
    switch (n.icon) {
      case 'house':
        // House shape
        ctx.beginPath();
        ctx.moveTo(x - 8, y);
        ctx.lineTo(x, y - 8);
        ctx.lineTo(x + 8, y);
        ctx.lineTo(x + 8, y + 6);
        ctx.lineTo(x - 8, y + 6);
        ctx.closePath();
        ctx.fill();
        break;
      case 'school':
        // School flag
        ctx.fillRect(x - 7, y - 5, 14, 10);
        ctx.fillRect(x - 1, y - 12, 2, 7);
        ctx.fillRect(x - 1, y - 12, 6, 4);
        break;
      case 'airplane':
        // Airplane silhouette
        ctx.beginPath();
        ctx.moveTo(x - 9, y);
        ctx.lineTo(x + 9, y);
        ctx.lineTo(x + 5, y - 3);
        ctx.lineTo(x + 9, y);
        ctx.lineTo(x + 5, y + 3);
        ctx.moveTo(x - 2, y - 5);
        ctx.lineTo(x + 2, y - 5);
        ctx.lineTo(x + 1, y);
        ctx.lineTo(x + 2, y + 5);
        ctx.lineTo(x - 2, y + 5);
        ctx.lineTo(x - 1, y);
        ctx.fill();
        break;
      case 'tower':
        // CN Tower
        ctx.fillRect(x - 2, y - 9, 4, 6);
        ctx.fillRect(x - 1, y - 3, 2, 12);
        // Top
        ctx.fillRect(x - 4, y - 11, 8, 2);
        break;
      case 'waterfall':
        // Niagara Falls - wavy lines
        for (let i = -7; i < 8; i += 3) {
          ctx.fillRect(x + i, y - 6 + Math.abs(i) / 2, 2, 12 - Math.abs(i) / 2);
        }
        break;
      case 'park':
        // Tree
        ctx.beginPath();
        ctx.arc(x, y - 3, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(x - 1, y + 3, 2, 4);
        break;
    }
  }
  cleanup() { stopBgm(); hideSubtitle(); }
}
SCENES.Chapter4 = Chapter4;

// ===== ENDING SCENE =====
// Backyard of new home. Father takes out ThinkPad. Player presses SPACE to open it.
// ThinkPad enlarges, screen fills, family photo appears, then Father's Day message.
class Ending extends Scene {
  init() {
    this.phase = 0;  // 0: backyard scene, 1: ThinkPad enlarging, 2: screen fills, 3: photo, 4: text, 5: buttons
    this.timer = 0;
    this.thinkpadScale = 0.3;
    this.thinkpadAlpha = 0;
    this.photoAlpha = 0;
    this.textIdx = -1;
    this.textCharIdx = 0;
    this.textLastChar = 0;
    // Button hover animation values (smooth)
    this.btnHoverMenu = 0;
    this.btnHoverAgain = 0;
    this.fullText = `Yifu Wang,

You traveled from Shenzhen to Toronto,
With your ThinkPad and our family's hopes.
You work so hard, and we are so proud of you.

Happy Father's Day.
We love you.

— Your Family`;
    this.fullLines = this.fullText.split('\n');
    this.shownLines = [];
    this.showButtons = false;
    this.hoveredButton = null;
    this.snowflakes = [];
    for (let i = 0; i < 40; i++) {
      this.snowflakes.push({
        x: rand(0, CW), y: rand(0, CH),
        vx: rand(0.1, 0.5), vy: rand(0.2, 0.7),
        size: rand(1, 2),
      });
    }
    startBgm('ending');
  }
  update(dt) {
    this.timer += dt;
    // Update snow
    this.snowflakes.forEach(s => {
      s.x += s.vx * dt / 16;
      s.y += s.vy * dt / 16;
      if (s.y > CH) { s.y = -5; s.x = rand(0, CW); }
    });

    if (this.phase === 0) {
      // Backyard scene, family standing, prompt to open ThinkPad
      if (this.timer > 1500) {
        showPrompt('Press SPACE to open the ThinkPad');
      }
    } else if (this.phase === 1) {
      // ThinkPad enlarging
      this.thinkpadAlpha = Math.min(1, this.timer / 500);
      this.thinkpadScale = lerp(0.5, 4.0, Math.min(1, this.timer / 2500));
      if (this.timer > 3000) {
        this.phase = 2;
        this.timer = 0;
      }
    } else if (this.phase === 2) {
      // Screen fills (ThinkPad screen expands to fill canvas)
      if (this.timer > 1500) {
        this.phase = 3;
        this.timer = 0;
        playSfx('confirm');
      }
    } else if (this.phase === 3) {
      // Family photo fades in
      this.photoAlpha = Math.min(1, this.timer / 1500);
      if (this.timer > 3000) {
        this.phase = 4;
        this.timer = 0;
        this.textIdx = 0;
        this.textCharIdx = 0;
        this.textLastChar = 0;
      }
    } else if (this.phase === 4) {
      // Typewriter text
      if (this.textIdx < this.fullLines.length) {
        if (this.timer - this.textLastChar > 50) {
          this.textLastChar = this.timer;
          const line = this.fullLines[this.textIdx];
          if (this.textCharIdx < line.length) {
            this.textCharIdx++;
            if (this.textCharIdx % 2 === 0) playSfx('blip');
          } else {
            // Move to next line
            this.shownLines.push(line);
            this.textIdx++;
            this.textCharIdx = 0;
            // Pause between lines
            this.textLastChar = this.timer + 300;
          }
        }
      } else {
        // All text shown - wait a bit then show buttons
        if (this.timer > 5000) {
          this.phase = 5;
          this.timer = 0;
          this.showButtons = true;
        }
      }
    }

    // Smooth hover animation for buttons
    if (this.showButtons) {
      const targetMenu = this.hoveredButton === 'menu' ? 1 : 0;
      const targetAgain = this.hoveredButton === 'again' ? 1 : 0;
      const lerpSpeed = 0.15;
      this.btnHoverMenu = lerp(this.btnHoverMenu, targetMenu, lerpSpeed);
      this.btnHoverAgain = lerp(this.btnHoverAgain, targetAgain, lerpSpeed);
    }
  }
  onKey(e) {
    if (this.phase === 0 && (e.key === ' ' || e.key === 'Enter')) {
      this.phase = 1;
      this.timer = 0;
      hidePrompt();
      playSfx('pickup');
    }
  }
  onMouseDown(x, y) {
    if (this.phase === 0) {
      // Click anywhere to open ThinkPad
      this.phase = 1;
      this.timer = 0;
      hidePrompt();
      playSfx('pickup');
    } else if (this.showButtons) {
      // Check button clicks - buttons on right side, aligned with text
      const by = CH - 80;
      const bw = 160, gap = 20;
      const centerX = 600;
      const totalW = bw * 2 + gap;
      const startX = centerX - totalW / 2;
      const bx1 = startX, bx2 = startX + bw + gap;
      if (x >= bx1 && x <= bx1 + bw && y >= by && y <= by + 36) {
        playSfx('confirm');
        game.gameComplete = true;
        saveGame();
        changeScene('MainMenu');
      } else if (x >= bx2 && x <= bx2 + bw && y >= by && y <= by + 36) {
        playSfx('confirm');
        game.gameComplete = true;
        saveGame();
        changeScene('Chapter1');
      }
    }
  }
  onMouseMove(x, y) {
    if (!this.showButtons) return;
    const by = CH - 80;
    const bw = 160, gap = 20;
    const centerX = 600;
    const totalW = bw * 2 + gap;
    const startX = centerX - totalW / 2;
    const bx1 = startX, bx2 = startX + bw + gap;
    if (x >= bx1 && x <= bx1 + bw && y >= by && y <= by + 36) this.hoveredButton = 'menu';
    else if (x >= bx2 && x <= bx2 + bw && y >= by && y <= by + 36) this.hoveredButton = 'again';
    else this.hoveredButton = null;
  }
  render() {
    // Always draw the backyard as base (visible during phase 0, fades out after)
    let bgAlpha = 1;
    if (this.phase >= 1) bgAlpha = Math.max(0, 1 - this.timer / 500);
    if (this.phase >= 2) bgAlpha = 0;

    if (bgAlpha > 0) {
      ctx.globalAlpha = bgAlpha;
      this.drawBackyard();
      ctx.globalAlpha = 1;
    }

    if (this.phase >= 1) {
      // Dark overlay
      ctx.fillStyle = `rgba(0,0,0,${Math.min(1, this.timer / 500)})`;
      ctx.fillRect(0, 0, CW, CH);
    }

    if (this.phase === 1) {
      // ThinkPad enlarging in center
      ctx.globalAlpha = this.thinkpadAlpha;
      const sz = spriteSize(SPR_THINKPAD_LARGE);
      const scale = this.thinkpadScale;
      const drawX = CW / 2 - sz.w * scale / 2;
      const drawY = CH / 2 - sz.h * scale / 2;
      drawSprite(ctx, SPR_THINKPAD_LARGE, PAL_THINKPAD_LARGE, drawX, drawY, scale);
      // Glowing screen
      const screenX = drawX + 5 * scale;
      const screenY = drawY + 6 * scale;
      const screenW = 70 * scale;
      const screenH = 12 * scale;
      const glowGrad = ctx.createRadialGradient(
        screenX + screenW / 2, screenY + screenH / 2, 0,
        screenX + screenW / 2, screenY + screenH / 2, screenW
      );
      glowGrad.addColorStop(0, 'rgba(100,180,240,0.5)');
      glowGrad.addColorStop(1, 'rgba(100,180,240,0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0, 0, CW, CH);
      ctx.globalAlpha = 1;
    } else if (this.phase >= 2) {
      // Full-screen ThinkPad screen - dark blue background
      const g = ctx.createLinearGradient(0, 0, 0, CH);
      g.addColorStop(0, '#0a1a2a');
      g.addColorStop(1, '#1a2a3a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, CW, CH);

      // Subtle glow border (ThinkPad frame hint)
      ctx.strokeStyle = '#2a3a4a';
      ctx.lineWidth = 30;
      ctx.strokeRect(0, 0, CW, CH);

      // Family photo
      if (this.phase >= 3 && this.photoAlpha > 0 && game.familyPhotoImg) {
        ctx.globalAlpha = this.photoAlpha;
        // Side-by-side layout: photo on left, text on right
        const photoW = 280;
        const photoH = 420;  // approximate portrait aspect
        const photoX = 80;
        const photoY = (CH - photoH) / 2;
        // Photo background frame
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(photoX - 12, photoY - 12, photoW + 24, photoH + 24);
        ctx.strokeStyle = '#c9a86a';
        ctx.lineWidth = 2;
        ctx.strokeRect(photoX - 12, photoY - 12, photoW + 24, photoH + 24);
        // Draw photo (object-fit: cover to fill the frame)
        // Photo is portrait 9:16, frame is 280x420 (~2:3), so cover will crop slightly
        const imgRatio = game.familyPhotoImg.width / game.familyPhotoImg.height;
        const frameRatio = photoW / photoH;
        let drawW, drawH, drawOffX = 0, drawOffY = 0;
        if (imgRatio > frameRatio) {
          // Image is wider - crop sides
          drawH = photoH;
          drawW = photoH * imgRatio;
          drawOffX = -(drawW - photoW) / 2;
        } else {
          // Image is taller - crop top/bottom
          drawW = photoW;
          drawH = photoW / imgRatio;
          drawOffY = -(drawH - photoH) / 2;
        }
        ctx.save();
        ctx.beginPath();
        ctx.rect(photoX, photoY, photoW, photoH);
        ctx.clip();
        ctx.drawImage(game.familyPhotoImg, photoX + drawOffX, photoY + drawOffY, drawW, drawH);
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      // Text on right side
      if (this.phase >= 4) {
        const textX = 420;
        const textStartY = 120;
        const lineH = 26;
        ctx.font = '16px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        // Already-shown lines
        ctx.fillStyle = '#f0d090';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        this.shownLines.forEach((line, i) => {
          ctx.fillText(line, textX, textStartY + i * lineH);
        });
        // Currently typing line
        if (this.textIdx < this.fullLines.length) {
          const currentLine = this.fullLines[this.textIdx].slice(0, this.textCharIdx);
          ctx.fillText(currentLine, textX, textStartY + this.shownLines.length * lineH);
        }
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
      }

      // Buttons
      if (this.showButtons) {
        this.drawButtons();
      }
    }
  }
  drawBackyard() {
    // Warm sunset sky
    const g = ctx.createLinearGradient(0, 0, 0, CH);
    g.addColorStop(0, '#f5c878');
    g.addColorStop(0.5, '#f5a868');
    g.addColorStop(1, '#c87848');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, CW, CH);

    // Distant houses (Toronto neighborhood)
    ctx.fillStyle = '#7a5a4a';
    for (let i = 0; i < 6; i++) {
      const hx = i * 170 + 30;
      const hy = 280 + Math.sin(i) * 10;
      const hw = 130, hh = 80;
      ctx.fillRect(hx, hy, hw, hh);
      // Roof
      ctx.fillStyle = '#5a3a2a';
      ctx.beginPath();
      ctx.moveTo(hx - 5, hy);
      ctx.lineTo(hx + hw / 2, hy - 25);
      ctx.lineTo(hx + hw + 5, hy);
      ctx.fill();
      ctx.fillStyle = '#7a5a4a';
      // Windows
      ctx.fillStyle = '#f0d890';
      ctx.fillRect(hx + 20, hy + 20, 25, 25);
      ctx.fillRect(hx + 75, hy + 20, 25, 25);
    }

    // Fence
    ctx.fillStyle = '#6a4a3a';
    ctx.fillRect(0, 380, CW, 8);
    for (let x = 0; x < CW; x += 30) {
      ctx.fillRect(x, 360, 6, 28);
    }

    // Grass
    ctx.fillStyle = '#5a8a4a';
    ctx.fillRect(0, 388, CW, CH - 388);
    // Grass texture
    ctx.fillStyle = '#3a6a2a';
    for (let i = 0; i < 100; i++) {
      ctx.fillRect(rand(0, CW), rand(390, CH), 2, 2);
    }

    // Tree on the right
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(820, 280, 12, 130);
    ctx.fillStyle = '#3a6a2a';
    ctx.beginPath();
    ctx.arc(826, 270, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a7a3a';
    ctx.beginPath();
    ctx.arc(815, 260, 35, 0, Math.PI * 2);
    ctx.fill();

    // Family standing in a row - using sprite sheets
    const familyY = 430;
    const family = [
      { x: 300, spriteSheet: SPR_FANNY_SHEET, palette: PAL_FANNY_SHEET, name: 'Fanny' },
      { x: 380, spriteSheet: SPR_ZIMO_SHEET, palette: PAL_ZIMO_SHEET, name: 'Zimo' },
      { x: 460, spriteSheet: SPR_YUKEER_SHEET, palette: PAL_YUKEER_SHEET, name: 'Yukeer' },
    ];
    family.forEach((f, i) => {
      const sc = 5;
      const sz = { w: 8, h: 8 };
      const x = f.x - sz.w * sc / 2;
      const y = familyY - sz.h * sc / 2;
      drawSheetCharacter(ctx, f.spriteSheet, f.palette, x, y, sc, 0, false);
    });

    // Father (center, holding ThinkPad) - using sprite sheet
    const fatherX = 540;
    const sc = 5;
    const sz = { w: 8, h: 8 };
    const x = fatherX - sz.w * sc / 2;
    const y = familyY - sz.h * sc / 2;
    drawSheetCharacter(ctx, SPR_YIFU_SHEET, PAL_YIFU_SHEET, x, y, sc, 0, false);
    // ThinkPad in father's hands (small)
    const tpSc = 1.5;
    const tpSz = spriteSize(SPR_THINKPAD_ITEM);
    drawSprite(ctx, SPR_THINKPAD_ITEM, PAL_THINKPAD_ITEM,
      fatherX - tpSz.w * tpSc / 2, y + sz.h * sc - 10, tpSc);

    // Soft warm sunlight overlay
    const sg = ctx.createRadialGradient(CW/2, 200, 100, CW/2, 200, 600);
    sg.addColorStop(0, 'rgba(255,220,140,0.2)');
    sg.addColorStop(1, 'rgba(255,180,100,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, CW, CH);

    // Floating particles (warm dust)
    const t = this.timer / 1000;
    ctx.fillStyle = 'rgba(255,220,140,0.5)';
    for (let i = 0; i < 20; i++) {
      const px = (i * 53 + t * 5) % CW;
      const py = (i * 31 + Math.sin(t + i) * 30 + t * 8) % CH;
      ctx.fillRect(px, py, 2, 2);
    }

    // Title overlay
    if (this.timer < 4000) {
      const a = this.timer < 1000 ? this.timer / 1000 :
                (this.timer > 3000 ? (4000 - this.timer) / 1000 : 1);
      ctx.globalAlpha = a;
      drawText('Roots', CW / 2, 50, {
        color: '#fff5d0', font: 'bold 28px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      drawText('A new home, a new chapter', CW / 2, 90, {
        color: '#f0d090', font: '14px "Courier New", monospace',
        align: 'center', shadow: true,
      });
      ctx.globalAlpha = 1;
    }
  }
  drawButtons() {
    // Buttons positioned on the RIGHT side, aligned with the letter text
    const by = CH - 80;
    const bw = 160, gap = 20;
    const centerX = 600;
    const totalW = bw * 2 + gap;
    const startX = centerX - totalW / 2;
    const bx1 = startX, bx2 = startX + bw + gap;
    const h1 = this.btnHoverMenu;
    const h2 = this.btnHoverAgain;

    // Button 1
    if (h1 > 0.01) {
      ctx.shadowColor = `rgba(240, 208, 144, ${h1 * 0.6})`;
      ctx.shadowBlur = 20 * h1;
    }
    ctx.fillStyle = `rgba(${lerp(60, 201, h1)}, ${lerp(50, 168, h1)}, ${lerp(30, 106, h1)}, ${lerp(0.6, 0.4, h1)})`;
    ctx.fillRect(bx1, by, bw, 36);
    ctx.strokeStyle = h1 > 0.5 ? '#f0d090' : '#c9a86a';
    ctx.lineWidth = lerp(2, 3, h1);
    ctx.strokeRect(bx1, by, bw, 36);
    ctx.shadowBlur = 0;
    drawText('BACK TO MENU', bx1 + bw / 2, by + 18, {
      color: h1 > 0.5 ? '#fff5d0' : '#f0d090',
      font: `bold ${lerp(12, 14, h1).toFixed(0)}px "Courier New", monospace`,
      align: 'center', baseline: 'middle',
    });

    // Button 2
    if (h2 > 0.01) {
      ctx.shadowColor = `rgba(240, 208, 144, ${h2 * 0.6})`;
      ctx.shadowBlur = 20 * h2;
    }
    ctx.fillStyle = `rgba(${lerp(60, 201, h2)}, ${lerp(50, 168, h2)}, ${lerp(30, 106, h2)}, ${lerp(0.6, 0.4, h2)})`;
    ctx.fillRect(bx2, by, bw, 36);
    ctx.strokeStyle = h2 > 0.5 ? '#f0d090' : '#c9a86a';
    ctx.lineWidth = lerp(2, 3, h2);
    ctx.strokeRect(bx2, by, bw, 36);
    ctx.shadowBlur = 0;
    drawText('PLAY AGAIN', bx2 + bw / 2, by + 18, {
      color: h2 > 0.5 ? '#fff5d0' : '#f0d090',
      font: `bold ${lerp(12, 14, h2).toFixed(0)}px "Courier New", monospace`,
      align: 'center', baseline: 'middle',
    });
  }
  cleanup() { stopBgm(); hidePrompt(); }
}
